<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHA V36.2 PRO - V12</title>
    <style>
        /* FUENTE PESADA ESTILO INDUSTRIAL */
        body { background-color: #000; color: #fff; font-family: 'Arial Black', 'Arial Bold', Gadget, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; text-transform: uppercase; }
        .v36-container { width: 100%; max-width: 420px; background: #000; padding-bottom: 30px; }
        
        /* CABECERA CON TEXTO GRUESO */
        .top-header { text-align: center; font-size: 11px; color: #888; letter-spacing: 1px; margin-bottom: 10px; font-weight: 900; }
        .nav-row { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; margin-bottom: 15px; }
        .gps-status { color: #00e5ff; font-size: 13px; font-weight: 900; text-shadow: 0 0 5px #00e5ff; }
        .temp-amb { border: 3px solid #39ff14; border-radius: 5px; padding: 4px 10px; background: #000; text-align: center; box-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }
        
        .title-main { text-align: center; font-size: 20px; font-weight: 900; margin: 15px 0; color: #fff; letter-spacing: -1px; }

        /* PESTAÑAS GRUESAS */
        .tabs-v36 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 0 10px; }
        .tab-v36 { padding: 15px 5px; text-align: center; font-size: 13px; font-weight: 900; background: #1a1a1a; border-radius: 4px; color: #555; border-bottom: 5px solid #333; }
        .tab-v36.aire { border-color: #00e5ff; color: #00e5ff; }
        .tab-v36.nev { border-color: #39ff14; color: #39ff14; }
        .tab-v36.auto { border-color: #ff3131; color: #ff3131; }

        /* SELECTORES ROBUSTOS */
        .sel-box { background: #111; margin: 15px 10px; padding: 15px; border: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .sel-group { flex: 1; }
        .sel-group label { display: block; font-size: 10px; color: #39ff14; font-weight: 900; margin-bottom: 5px; }
        select { width: 100%; background: #000; color: #fff; border: 2px solid #444; padding: 10px; font-size: 16px; font-weight: 900; }
        .check-blue { background: #0066ff; color: #fff; border: none; padding: 10px; border-radius: 4px; font-weight: 900; margin-top: 15px; }

        /* MANOMETROS: EL CORAZÓN DE LA APP */
        .press-area { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 10px; margin-bottom: 20px; }
        .manometro { border: 4px solid; border-radius: 10px; padding: 15px 5px; text-align: center; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .manometro span { display: block; font-size: 12px; font-weight: 900; margin-bottom: 10px; }
        .num-v36 { background: none; border: none; color: inherit; font-size: 45px; font-weight: 900; width: 100%; text-align: center; font-family: 'Arial Black', sans-serif; outline: none; }

        /* BARRA DE INFO VERDE */
        .status-bar { background: #0a1a0a; border-left: 8px solid #39ff14; padding: 15px; margin: 10px; border-radius: 0 5px 5px 0; }
        .status-bar div { font-size: 12px; font-weight: 900; color: #39ff14; letter-spacing: 0.5px; }

        /* MÓDULO DE REPOSO V12 */
        .reposo-v12 { background: #050505; border: 2px dashed #39ff14; margin: 10px; padding: 20px; border-radius: 15px; }
        .timer-row { display: flex; justify-content: space-between; align-items: center; text-align: center; }
        .clock-heavy { font-size: 30px; font-weight: 900; font-family: monospace; }
        .play-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #1b5e20; color: #fff; font-size: 26px; box-shadow: 0 0 20px #39ff1466; }
    </style>
</head>
<body>

<div class="v36-container">
    <div class="top-header">MULTISERVICIOS ANATO S.M.G.</div>
    
    <div class="nav-row">
        <div class="gps-status">GPS: CONECTADO</div>
        <div class="temp-amb">
            <div style="font-size:10px; color:#39ff14;">AMB.</div>
            <div style="font-size:22px; font-weight:900; color:#39ff14;">25°C</div>
        </div>
    </div>

    <div class="title-main">ANALIZADOR DE PRESIONES JHA</div>

    <div class="tabs-v36">
        <div class="tab-v36 aire">AIRES</div>
        <div class="tab-v36 nev">NEVERAS</div>
        <div class="tab-v36 auto">AUTO</div>
    </div>

    <div class="sel-box">
        <div class="sel-group">
            <label>GAS ORIG.</label>
            <select id="g" onchange="upd()">
                <option value="R410A">R410A</option>
                <option value="R22">R22</option>
            </select>
        </div>
        <button class="check-blue">✔</button>
        <div class="sel-group">
            <label>REEMP.</label>
            <select>
                <option>SIN REEMP.</option>
                <option>MO29 (422D)</option>
            </select>
        </div>
    </div>

    <div class="press-area">
        <div class="manometro" style="border-color:#00e5ff; color:#00e5ff;">
            <span>BAJA (PSI)</span>
            <input type="number" id="vb" class="num-v36" value="110" oninput="meta()">
        </div>
        <div class="manometro" style="border-color:#ff3131; color:#ff3131;">
            <span>ALTA (PSI)</span>
            <input type="number" id="va" class="num-v36" value="288" oninput="meta()">
        </div>
    </div>

    <div class="status-bar">
        <div id="ideal">CALCULANDO IDEAL PARA: R410A</div>
        <div id="extra">● ACEITE: POE | ● CARGA: LÍQUIDA</div>
    </div>

    <div class="reposo-v12">
        <div class="timer-row">
            <div style="color:#00e5ff;">
                <div style="font-size:11px;">IDEAL</div>
                <div id="cI" class="clock-heavy">05:00</div>
                <div id="pI" style="font-size:16px;">-- PSI</div>
                <div style="font-size:10px; color:#fff;">META: <span id="mT">--</span></div>
            </div>
            <button onclick="start()" class="play-btn">▶</button>
            <div style="color:#39ff14;">
                <div style="font-size:11px;">REAL</div>
                <div id="cR" class="clock-heavy">00:00</div>
                <div id="pR" style="font-size:16px;">-- PSI</div>
                <div id="st" style="font-size:10px;">READY</div>
            </div>
        </div>
    </div>
</div>

<script>
    let t, sR=0, sI=300, run=false;
    function meta(){
        let b=parseFloat(document.getElementById('vb').value)||0, a=parseFloat(document.getElementById('va').value)||0;
        document.getElementById('mT').innerText=((b+a)/2).toFixed(1);
    }
    function start(){
        if(run)return; run=true; sR=0; sI=300; meta();
        let b0=parseFloat(document.getElementById('vb').value), m0=parseFloat(document.getElementById('mT').innerText);
        t=setInterval(()=>{
            sR++;
            document.getElementById('cR').innerText=`${Math.floor(sR/60).toString().padStart(2,'0')}:${(sR%60).toString().padStart(2,'0')}`;
            document.getElementById('pR').innerText=(b0+((m0-b0)*(sR/300))).toFixed(1);
            if(sI>0){
                sI--;
                document.getElementById('cI').innerText=`${Math.floor(sI/60).toString().padStart(2,'0')}:${(sI%60).toString().padStart(2,'0')}`;
                document.getElementById('pI').innerText=(b0+((m0-b0)*((300-sI)/300))).toFixed(1);
            }
        },1000);
    }
    window.onload=meta;
    function upd(){ document.getElementById('ideal').innerText = "CALCULANDO IDEAL PARA: " + document.getElementById('g').value; }
</script>
</body>
</html>
