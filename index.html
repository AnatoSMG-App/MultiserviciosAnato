<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.H.A V2 - CALIBRACIÓN ALTA</title>
    <style>
        body { background-color: #0c0c0c; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 420px; border: 2px solid #39ff14; border-radius: 20px; padding: 15px; background: #141414; box-shadow: 0 0 20px rgba(57, 255, 20, 0.3); }
        .header { text-align: center; margin-bottom: 10px; position: relative; }
        .gps-row { display: flex; justify-content: space-between; align-items: center; color: #00d4ff; font-size: 12px; margin-bottom: 5px; }
        .btn-btu { background: #ff5722; color: white; border: none; padding: 5px 12px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 11px; box-shadow: 0 3px #bf360c; }
        .dashboard-box { background: #252525; border: 1px solid #444; border-radius: 12px; padding: 10px; margin-bottom: 10px; position: relative; display: flex; align-items: center; }
        .temp-box { position: absolute; right: 10px; border: 2px solid #39ff14; border-radius: 8px; padding: 5px 10px; background: #000; text-align: center; cursor: pointer; }
        .temp-val { font-size: 22px; font-weight: bold; color: #39ff14; }
        select { width: 100%; padding: 12px; background: #1a1a1a; color: #39ff14; border: 1px solid #39ff14; border-radius: 10px; margin-bottom: 10px; font-weight: bold; font-size: 15px; }
        .press-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 10px 0; }
        .p-box { border: 3px solid; border-radius: 15px; padding: 10px; text-align: center; background: #000; }
        .p-val { background: none; border: none; color: inherit; font-size: 32px; font-weight: bold; width: 100%; text-align: center; outline: none; }
        .reposo-v2 { border: 2px dashed #39ff14; border-radius: 18px; padding: 15px; background: #080808; margin-top: 15px; }
        .timer-grid { display: grid; grid-template-columns: 1fr 80px 1fr; gap: 10px; align-items: center; text-align: center; }
        .btn-mando { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 20px; font-weight: bold; }
        .col-ideal { color: #00d4ff; } .col-real { color: #39ff14; } .col-danger { color: #ff3131; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="gps-row">
            <span id="gps" onclick="activarGPS()">📍 UBICACIÓN: BUSCANDO...</span>
            <a href="dimensiones.html" class="btn-btu">📏 BTU</a>
        </div>
        <h1 style="font-size: 16px; margin: 5px 0;">⚙️ ANALIZADOR J.H.A V2</h1>
    </div>

    <div class="dashboard-box">
        <span style="color:#00d4ff; font-weight:bold; font-size:14px; margin-left:10px;">PROYECCIÓN DE FLUJO</span>
        <div class="temp-box" onclick="ajustarTemp()">
            <span style="font-size:9px; display:block; color:#aaa;">AMB.</span>
            <span class="temp-val" id="tAmb">30</span><span style="color:#39ff14; font-weight:bold;">°C</span>
        </div>
    </div>

    <select id="gas" onchange="update()">
        <optgroup label="AIRES (RECALIBRADOS)">
            <option value="R22" data-base="65" data-f="3.8" data-oil="MINERAL">R22</option>
            <option value="R410A" data-base="118" data-f="5.8" data-oil="POE">R410A</option>
            <option value="R32" data-base="115" data-f="5.6" data-oil="POE">R32</option>
        </optgroup>
        <optgroup label="NEVERAS">
            <option value="R134a" data-base="15" data-f="4.5" data-oil="POE">R134a</option>
            <option value="R600a" data-base="0" data-f="3.1" data-oil="MINERAL">R600a</option>
        </optgroup>
    </select>

    <div id="info" style="text-align:center; color:#39ff14; font-size:11px; font-weight:bold; margin-bottom:10px;">ACEITE: MINERAL | SISTEMA: OK</div>

    <div class="press-grid">
        <div class="p-box" style="border-color:#00d4ff; color:#00d4ff;">
            <span style="font-size:10px;">BAJA (PSI)</span>
            <input type="number" id="b" class="p-val" oninput="recalcManual()">
        </div>
        <div class="p-box" style="border-color:#ff3131; color:#ff3131;">
            <span style="font-size:10px;">ALTA (PSI)</span>
            <input type="number" id="a" class="p-val" oninput="recalcManual()">
        </div>
    </div>

    <div class="reposo-v2">
        <div class="timer-grid">
            <div>
                <div style="font-size:9px; color:#888;">IDEAL</div>
                <div id="cI" style="font-size:24px; font-weight:bold;" class="col-ideal">05:00</div>
                <div id="pI" style="font-size:14px; font-weight:bold;" class="col-ideal">-- PSI</div>
                <div style="font-size:8px;">META: <span id="meta">0.0</span></div>
            </div>
            <div>
                <button class="btn-mando" style="background:#b71c1c; color:white; margin-bottom:10px;" onclick="stopR()">■</button>
                <button class="btn-mando" style="background:#1b5e20; color:white;" onclick="startR()">▶</button>
            </div>
            <div>
                <div style="font-size:9px; color:#888;">REAL</div>
                <div id="cR" style="font-size:24px; font-weight:bold;" class="col-real">00:00</div>
                <div id="pR" style="font-size:14px; font-weight:bold;" class="col-real">-- PSI</div>
                <div style="font-size:8px;">TEST ACTUAL</div>
            </div>
        </div>
        <div id="diag" style="text-align:center; font-size:11px; margin-top:10px; font-weight:bold; color:#39ff14;">LISTO PARA ANALIZAR FLUJO</div>
    </div>
</div>

<script>
    let t, sR=0, sI=300, run=false, temp=30;

    function ajustarTemp() {
        let nueva = prompt("Temperatura Ambiente (°C):", temp);
        if(nueva) { temp = parseInt(nueva); document.getElementById('tAmb').innerText = temp; update(); }
    }

    function activarGPS() {
        if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('gps').innerText = `📍 ${p.coords.latitude.toFixed(3)}, ${p.coords.longitude.toFixed(3)}`;
        });
    }

    function update() {
        const gas = document.getElementById('gas').options[document.getElementById('gas').selectedIndex];
        const factor = parseFloat(gas.dataset.f);
        const baseBaja = parseFloat(gas.dataset.base);
        
        // FÓRMULA DE ALTA CORREGIDA (Temp * Factor + Ajuste dinámico)
        let calcAlta = (temp * factor) + (baseBaja * 1.2);
        let calcBaja = baseBaja + (temp - 30);

        document.getElementById('b').value = calcBaja.toFixed(0);
        document.getElementById('a').value = calcAlta.toFixed(0);
        document.getElementById('meta').innerText = ((calcBaja + calcAlta) / 2).toFixed(1);
        document.getElementById('info').innerText = `ACEITE: ${gas.dataset.oil} | ALTA CALIBRADA`;
    }

    function recalcManual() {
        let vb = parseFloat(document.getElementById('b').value) || 0;
        let va = parseFloat(document.getElementById('a').value) || 0;
        document.getElementById('meta').innerText = ((vb + va) / 2).toFixed(1);
    }

    function startR() {
        if(run) return; run = true; sR = 0; sI = 300;
        let b0 = parseFloat(document.getElementById('b').value), m0 = parseFloat(document.getElementById('meta').innerText);
        t = setInterval(() => {
            sR++;
            document.getElementById('cR').innerText = `${Math.floor(sR/60).toString().padStart(2,'0')}:${(sR%60).toString().padStart(2,'0')}`;
            if(sR > 300) document.getElementById('cR').style.color = "#ff3131";
            document.getElementById('pR').innerText = (b0 + ((m0 - b0) * (sR/300))).toFixed(1) + " PSI";
            if(sI > 0) {
                sI--;
                document.getElementById('cI').innerText = `${Math.floor(sI/60).toString().padStart(2,'0')}:${(sI%60).toString().padStart(2,'0')}`;
                document.getElementById('pI').innerText = (b0 + ((m0 - b0) * ((300-sI)/300))).toFixed(1) + " PSI";
            }
            if(sR === 480) document.getElementById('diag').innerText = "⚠️ COLESTEROL ALTO - REVISAR CAPILAR";
        }, 1000);
    }

    function stopR() { clearInterval(t); run = false; }
    window.onload = update;
</script>
</body>
</html>
