<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Narrow', sans-serif; margin: 0; padding: 10px; text-transform: uppercase; }
        .v24-header { width: 100%; max-width: 415px; margin: 0 auto; border: 1px solid #222; padding: 10px; border-radius: 12px 12px 0 0; background: #000; }
        
        /* EMPRESA Y RELOJ */
        .top-info { text-align: center; margin-bottom: 10px; }
        .empresa { font-size: 14px; color: #FFFFFF; font-weight: 900; letter-spacing: 1px; }
        .status-msg { color: #00e5ff; font-size: 11px; font-weight: 900; margin: 4px 0; }
        .clock-real { font-size: 18px; font-weight: 900; font-family: monospace; letter-spacing: 1px; }

        /* FILA DE CONTROLES */
        .main-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 15px; }

        /* GPS MANUAL */
        .gps-side { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; min-width: 50px; }
        .gps-box { width: 22px; height: 22px; border: 2px solid #fff; background: #000; display: flex; align-items: center; justify-content: center; }
        .gps-active .gps-box { background: #fff; }
        .gps-active .gps-box::after { content: '✔'; color: #000; font-size: 18px; font-weight: 900; }
        .gps-lbl { font-size: 10px; font-weight: 900; }

        /* TÍTULO CENTRAL CIAN */
        .jha-brand { flex: 1; text-align: center; color: #00e5ff; font-size: 18px; font-weight: 900; line-height: 1; text-shadow: 0 0 10px #00e5ff44; }

        /* AMBIENTE VERDE */
        .amb-side { border: 2px solid #39ff14; border-radius: 8px; padding: 5px; background: #051005; box-shadow: 0 0 10px #39ff1444; text-align: center; min-width: 65px; }
        .amb-lbl { font-size: 8px; color: #39ff14; font-weight: 900; display: block; }
        .amb-row { display: flex; align-items: center; justify-content: center; }
        .amb-in { background: none; border: none; color: #39ff14; font-size: 22px; font-weight: 900; font-family: monospace; width: 40px; text-align: center; outline: none; }

        /* BOTÓN BTU (FLOTANTE O EN ESQUINA) */
        .btu-float { position: absolute; top: 20px; right: 20px; background: #ff5722; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-weight: 900; font-size: 11px; text-decoration: none; box-shadow: 0 3px #bf360c; }
    </style>
</head>
<body>

<div class="v24-header">
    <a href="calculadora_btu.html" class="btu-float">BTU 📏</a>

    <div class="top-info">
        <div class="empresa">⚙️ MULTISERVICIOS ANATO S.M.G.</div>
        <div id="gps-status" class="status-msg">📍 BUSCANDO SEÑAL...</div>
        <div id="live-clock" class="clock-real">00:00:00 a. m.</div>
    </div>

    <div class="main-row">
        <div id="gps-btn" class="gps-side" onclick="toggleGPS()">
            <div class="gps-box"></div>
            <span class="gps-lbl">GPS</span>
        </div>

        <div class="jha-brand">
            ANALIZADOR DE<br>PRESIONES JHA
        </div>

        <div class="amb-side">
            <span class="amb-lbl">AMB.</span>
            <div class="amb-row">
                <input type="number" id="temp-val" class="amb-in" value="30">
                <span style="color:#39ff14; font-weight:900; font-size: 18px;">°C</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Reloj en tiempo real
    function updateClock() {
        const now = new Date();
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const ampm = h >= 12 ? 'p. m.' : 'a. m.';
        h = h % 12 || 12;
        document.getElementById('live-clock').innerText = `${h}:${m}:${s} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // GPS Manual
    function toggleGPS() {
        const btn = document.getElementById('gps-btn');
        const status = document.getElementById('gps-status');
        const isAct = btn.classList.toggle('gps-active');
        
        if(isAct) {
            status.innerText = "📍 GPS: CONECTADO";
            status.style.color = "#00e5ff";
            // Aquí podrías jalar ubicación real si quieres, pero lo dejo manual.
        } else {
            status.innerText = "📍 BUSCANDO SEÑAL...";
            status.style.color = "#00e5ff";
        }
    }
</script>

</body>
</html>
