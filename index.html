<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHA V36.2 PRO - EL REY</title>
    <style>
        /* ESTA ES LA FUENTE QUE HACE QUE SE VEA COMO LA 36.2 */
        body { background-color: #000; color: #fff; font-family: 'Arial Black', Impact, sans-serif; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; text-transform: uppercase; }
        .v36-container { width: 100%; max-width: 420px; border: 2px solid #1a1a1a; padding-bottom: 30px; }

        /* CABECERA REAL */
        .top-brand-name { text-align: center; font-size: 11px; color: #555; padding: 5px; font-weight: 900; letter-spacing: 1px; }
        .nav-v36 { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 10px; }
        .gps-v36 { color: #00e5ff; font-size: 13px; font-weight: 900; }
        .temp-v36 { border: 3px solid #39ff14; border-radius: 6px; padding: 5px 12px; background: #000; box-shadow: 0 0 15px #39ff1488; text-align: center; }
        
        .title-v36 { text-align: center; font-size: 22px; font-weight: 900; margin: 15px 0; letter-spacing: -1px; }

        /* BOTONES DE MODO GORDOS */
        .modes-v36 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 10px; margin-bottom: 20px; }
        .mode-v36 { padding: 15px 0; text-align: center; font-size: 14px; font-weight: 900; border-radius: 6px; background: #111; border-bottom: 5px solid #333; }
        .mode-v36.active-a { border-color: #00e5ff; color: #00e5ff; background: #081214; }
        .mode-v36.active-n { border-color: #39ff14; color: #39ff14; background: #081408; }
        .mode-v36.active-au { border-color: #ff3131; color: #ff3131; background: #140808; }

        /* SELECTORES CON GASES DE NEVERA */
        .panel-sel { background: #0a0a0a; margin: 0 10px 20px 10px; padding: 15px; border: 1px solid #222; border-radius: 10px; }
        .row-sel { display: flex; align-items: center; gap: 10px; }
        .item-sel { flex: 1; }
        .item-sel label { display: block; font-size: 11px; color: #39ff14; font-weight: 900; margin-bottom: 6px; }
        select { width: 100%; background: #000; color: #fff; border: 2px solid #333; padding: 10px; font-size: 17px; font-weight: 900; border-radius: 5px; }
        .check-v36 { background: #0055ff; color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: 900; margin-top: 20px; box-shadow: 0 0 10px #0055ff; }

        /* MANOMETROS DE ALTO IMPACTO */
        .grid-p { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 10px; margin-bottom: 20px; }
        .box-p { border: 4px solid; border-radius: 15px; padding: 22px 5px; text-align: center; background: #000; }
        .box-p span { display: block; font-size: 13px; font-weight: 900; margin-bottom: 12px; }
        .in-p { background: none; border: none; color: inherit; font-size: 52px; font-weight: 900; width: 100%; text-align: center; font-family: 'Arial Black', sans-serif; outline: none; }

        /* FRANJA DE INFO */
        .strip-v36 { background: #081408; border-left: 10px solid #39ff14; padding: 15px; margin: 0 10px 20px 10px; }
        .strip-v36 div { font-size: 12px; font-weight: 900; color: #39ff14; margin-bottom: 5px; }

        /* REPOSO V15 */
        .reposo-v15 { border: 3px dashed #39ff14; margin: 0 10px; padding: 20px; border-radius: 20px; background: #050505; }
        .timer-v15 { display: flex; justify-content: space-around; align-items: center; text-align: center; }
        .clock-v15 { font-size: 35px; font-weight: 900; font-family: monospace; color: #fff; }
        .go-v15 { width: 65px; height: 65px; border-radius: 50%; border: none; background: #1b5e20; color: #fff; font-size: 30px; box-shadow: 0 0 20px #39ff1466; }
    </style>
</head>
<body>

<div class="v36-container">
    <div class="top-brand-name">MULTISERVICIOS ANATO S.M.G.</div>
    
    <div class="nav-v36">
        <div class="gps-v36">📍 GPS: CONECTADO</div>
        <div class="temp-v36">
            <div style="font-size:10px; color:#39ff14; font-weight:900;">AMB.</div>
            <div style="font-size:26px; font-weight:900; color:#39ff14;">25°C</div>
        </div>
    </div>

    <div class="title-v36">ANALIZADOR DE PRESIONES JHA</div>

    <div class="modes-v36">
        <div class="mode-v36 active-a">AIRES</div>
        <div class="mode-v36 active-n">NEVERAS</div>
        <div class="mode-v36 active-au">AUTO</div>
    </div>

    <div class="panel-sel">
        <div class="row-sel">
            <div class="item-sel">
                <label>GAS ORIG.</label>
                <select id="gas" onchange="upd()">
                    <option value="R410A" data-o="POE" data-f="5.8">R410A</option>
                    <option value="R22" data-o="MINERAL" data-f="3.8">R22</option>
                    <option value="R134a" data-o="POE/PAG" data-f="4.2">R134a</option>
                    <option value="R600a" data-o="MINERAL" data-f="3.1">R600a</option>
                    <option value="R290" data-o="POE" data-f="4.8">R290</option>
                </select>
            </div>
            <button class="check-v36">✔</button>
            <div class="item-sel">
                <label>REEMP.</label>
                <select>
                    <option>SIN REEMP.</option>
                    <option>MO29 (422D)</option>
                    <option>MO99 (438A)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="grid-p">
        <div class="box-p" style="border-color:#00e5ff; color:#00e5ff; box-shadow: 0 0 20px #00e5ff44;">
            <span>BAJA (PSI)</span>
            <input type="number" id="vb" class="in-p" value="110" oninput="meta()">
        </div>
        <div class="box-p" style="border-color:#ff3131; color:#ff3131; box-shadow: 0 0 20px #ff313144;">
            <span>ALTA (PSI)</span>
            <input type="number" id="va" class="in-p" value="288" oninput="meta()">
        </div>
    </div>

    <div class="strip-v36">
        <div id="it">CALCULANDO IDEAL PARA: R410A</div>
        <div id="at">● ACEITE: POE | ● CARGA: LÍQUIDA</div>
    </div>

    <div class="reposo-v15">
        <div class="timer-v15">
            <div style="color:#00e5ff;">
                <div style="font-size:12px; font-weight:900;">IDEAL</div>
                <div id="cI" class="clock-v15">05:00</div>
                <div id="pI" style="font-size:18px; font-weight:900;">-- PSI</div>
                <div style="font-size:11px; color:#fff;">META: <span id="mT">199.0</span></div>
            </div>
            <button onclick="start()" class="go-v15">▶</button>
            <div style="color:#39ff14;">
                <div style="font-size:12px; font-weight:900;">REAL</div>
                <div id="cR" class="clock-v15">00:00</div>
                <div id="pR" style="font-size:18px; font-weight:900;">-- PSI</div>
                <div id="st" style="font-size:11px; font-weight:900;">READY</div>
            </div>
        </div>
    </div>
</div>

<script>
    let t, sR=0, sI=300, run=false;
    function meta(){
        let b=parseFloat(document.getElementById('vb').value)||0, a=parseFloat(document.getElementById('va').value)||0;
        document.getElementById('mT').innerText=((b+a)/2).toFixed(1);
    }
    function start(){
        if(run)return; run=true; sR=0; sI=300; meta();
        let b0=parseFloat(document.getElementById('vb').value), m0=parseFloat(document.getElementById('mT').innerText);
        t=setInterval(()=>{
            sR++;
            document.getElementById('cR').innerText=`${Math.floor(sR/60).toString().padStart(2,'0')}:${(sR%60).toString().padStart(2,'0')}`;
            document.getElementById('pR').innerText=(b0+((m0-b0)*(sR/300))).toFixed(1);
            if(sI>0){
                sI--;
                document.getElementById('cI').innerText=`${Math.floor(sI/60).toString().padStart(2,'0')}:${(sI%60).toString().padStart(2,'0')}`;
                document.getElementById('pI').innerText=(b0+((m0-b0)*((300-sI)/300))).toFixed(1);
            }
        },1000);
    }
    function upd(){
        let g=document.getElementById('gas');
        document.getElementById('it').innerText="CALCULANDO IDEAL PARA: "+g.value;
    }
    window.onload=meta;
</script>
</body>
</html>
