<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHA V36.2 - MULTISERVICIOS ANATO S.M.G.</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Black', Gadget, sans-serif; margin: 0; padding: 5px; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; }
        .v36-container { width: 100%; max-width: 420px; border: 1px solid #333; padding-bottom: 25px; }

        /* NOMBRE DE LA EMPRESA Y BOTÓN BTU */
        .top-bar { text-align: center; font-size: 11px; color: #888; padding: 8px 0; font-weight: 900; letter-spacing: 1px; }
        .header-main { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 10px; }
        .btu-orange { background: #ff5722; color: #fff; border: none; padding: 6px 15px; border-radius: 4px; font-weight: 900; box-shadow: 0 4px #bf360c; cursor: pointer; }
        
        /* GPS Y TEMPERATURA */
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 15px; }
        .gps-box { color: #00e5ff; font-size: 13px; font-weight: 900; text-shadow: 0 0 5px #00e5ff66; }
        .amb-box { border: 3px solid #39ff14; border-radius: 8px; padding: 5px 12px; background: #000; box-shadow: 0 0 15px #39ff1466; text-align: center; }

        .app-title { text-align: center; font-size: 20px; font-weight: 900; margin: 10px 0; }

        /* TABS */
        .tabs-v36 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 0 10px; margin-bottom: 20px; }
        .tab-v36 { padding: 14px 0; text-align: center; font-size: 13px; font-weight: 900; border-radius: 5px; background: #151515; border-bottom: 5px solid #333; color: #444; }
        .tab-v36.active-a { border-color: #00e5ff; color: #00e5ff; }
        .tab-v36.active-n { border-color: #39ff14; color: #39ff14; }

        /* PANEL DE GASES Y REEMPLAZOS */
        .panel-select { background: #0a0a0a; margin: 0 10px 20px 10px; padding: 15px; border: 1px solid #222; border-radius: 10px; }
        .select-grid { display: flex; align-items: center; gap: 10px; }
        .sel-item { flex: 1; }
        .sel-item label { display: block; font-size: 10px; color: #39ff14; font-weight: 900; margin-bottom: 5px; }
        select { width: 100%; background: #000; color: #fff; border: 2px solid #444; padding: 10px; font-size: 16px; font-weight: 900; outline: none; }
        .check-blue { background: #0066ff; color: #fff; border: none; padding: 12px; border-radius: 5px; margin-top: 18px; font-weight: 900; }

        /* MANOMETROS */
        .press-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 10px; margin-bottom: 20px; }
        .manometro { border: 4px solid; border-radius: 15px; padding: 20px 5px; text-align: center; background: #000; }
        .manometro span { display: block; font-size: 12px; font-weight: 900; margin-bottom: 10px; }
        .val-v36 { background: none; border: none; color: inherit; font-size: 48px; font-weight: 900; width: 100%; text-align: center; outline: none; font-family: 'Arial Black'; }

        /* INFO STRIP */
        .info-strip { background: #0a1a0a; border-left: 10px solid #39ff14; padding: 15px; margin: 0 10px 20px 10px; }
        .info-strip div { font-size: 11px; font-weight: 900; color: #39ff14; }

        /* MÓDULO DE REPOSO CON NOMBRE */
        .reposo-container { border: 2px dashed #39ff14; margin: 0 10px; padding: 15px; border-radius: 20px; background: #050505; }
        .reposo-title { text-align: center; color: #39ff14; font-size: 12px; font-weight: 900; margin-bottom: 10px; letter-spacing: 2px; }
        .timer-row { display: flex; justify-content: space-around; align-items: center; text-align: center; }
        .clock-num { font-size: 30px; font-weight: 900; font-family: monospace; }
        .btn-start { width: 60px; height: 60px; border-radius: 50%; border: none; background: #1b5e20; color: #fff; font-size: 26px; box-shadow: 0 0 15px #39ff1466; cursor: pointer; }
    </style>
</head>
<body>

<div class="v36-container">
    <div class="top-bar">MULTISERVICIOS ANATO S.M.G.</div>
    
    <div class="header-main">
        <div class="gps-box">📍 GPS: CONECTADO</div>
        <button class="btu-orange">BTU 📏</button>
    </div>

    <div class="info-row">
        <div style="font-size: 10px; color: #666;">ANALIZADOR PRO V36.2</div>
        <div class="amb-box">
            <div style="font-size:9px; color:#39ff14; font-weight:900;">AMB.</div>
            <div style="font-size:24px; font-weight:900; color:#39ff14;">25°C</div>
        </div>
    </div>

    <div class="app-title">ANALIZADOR DE PRESIONES JHA</div>

    <div class="tabs-v36">
        <div class="tab-v36 active-a">AIRES</div>
        <div class="tab-v36 active-n">NEVERAS</div>
        <div class="tab-v36">AUTO</div>
    </div>

    <div class="panel-select">
        <div class="select-grid">
            <div class="sel-item">
                <label>GAS ORIG.</label>
                <select id="gas" onchange="upd()">
                    <option value="R410A" data-o="POE">R410A</option>
                    <option value="R22" data-o="MINERAL">R22</option>
                    <option value="R134a" data-o="POE/PAG">R134a</option>
                    <option value="R600a" data-o="MINERAL">R600a</option>
                    <option value="R290" data-o="POE">R290</option>
                </select>
            </div>
            <button class="check-blue">✔</button>
            <div class="sel-item">
                <label>REEMP.</label>
                <select id="reemp">
                    <option>SIN REEMP.</option>
                    <option>MO29 (422D)</option>
                    <option>MO99 (438A)</option>
                    <option>R427A</option>
                </select>
            </div>
        </div>
    </div>

    <div class="press-grid">
        <div class="manometro" style="border-color:#00e5ff; color:#00e5ff;">
            <span>BAJA (PSI)</span>
            <input type="number" id="vb" class="val-v36" value="110" oninput="meta()">
        </div>
        <div class="manometro" style="border-color:#ff3131; color:#ff3131;">
            <span>ALTA (PSI)</span>
            <input type="number" id="va" class="val-v36" value="288" oninput="meta()">
        </div>
    </div>

    <div class="info-strip">
        <div id="ideal">CALCULANDO IDEAL PARA: R410A</div>
        <div id="aceite">● ACEITE: POE | ● CARGA: LÍQUIDA</div>
    </div>

    <div class="reposo-container">
        <div class="reposo-title">SISTEMA DE REPOSO PROFESIONAL</div>
        <div class="timer-row">
            <div style="color:#00e5ff;">
                <div style="font-size:10px;">IDEAL</div>
                <div id="cI" class="clock-num">05:00</div>
                <div id="pI" style="font-size:16px;">-- PSI</div>
                <div style="font-size:10px; color:#fff;">META: <span id="mT">--</span></div>
            </div>
            <button onclick="start()" class="btn-start">▶</button>
            <div style="color:#39ff14;">
                <div style="font-size:10px;">REAL</div>
                <div id="cR" class="clock-num">00:00</div>
                <div id="pR" style="font-size:16px;">-- PSI</div>
                <div id="st" style="font-size:10px;">READY</div>
            </div>
        </div>
    </div>
</div>

<script>
    let t, sR=0, sI=300, run=false;
    function meta(){
        let b=parseFloat(document.getElementById('vb').value)||0, a=parseFloat(document.getElementById('va').value)||0;
        document.getElementById('mT').innerText=((b+a)/2).toFixed(1);
    }
    function start(){
        if(run)return; run=true; sR=0; sI=300; meta();
        let b0=parseFloat(document.getElementById('vb').value), m0=parseFloat(document.getElementById('mT').innerText);
        t=setInterval(()=>{
            sR++;
            document.getElementById('cR').innerText=`${Math.floor(sR/60).toString().padStart(2,'0')}:${(sR%60).toString().padStart(2,'0')}`;
            document.getElementById('pR').innerText=(b0+((m0-b0)*(sR/300))).toFixed(1);
            if(sI>0){
                sI--;
                document.getElementById('cI').innerText=`${Math.floor(sI/60).toString().padStart(2,'0')}:${(sI%60).toString().padStart(2,'0')}`;
                document.getElementById('pI').innerText=(b0+((m0-b0)*((300-sI)/300))).toFixed(1);
            }
        },1000);
    }
    function upd(){
        let g=document.getElementById('gas');
        document.getElementById('ideal').innerText="CALCULANDO IDEAL PARA: "+g.value;
    }
    window.onload=meta;
</script>
</body>
</html>
