<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Presiones S.M.G.</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: sans-serif; text-align: center; }
        .container { padding: 20px; border: 2px solid #0f0; border-radius: 15px; display: inline-block; margin-top: 50px; }
        input, select { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 10px; border-radius: 5px; }
        .manometro { font-size: 2em; font-weight: bold; margin: 20px; padding: 20px; border: 3px solid #0f0; border-radius: 50%; display: inline-block; width: 120px; height: 120px; line-height: 120px; }
        button { background: #0f0; color: #000; padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>S.M.G. - Analizador V36</h1>
        
        <label>Temperatura Ambiente (°C):</label><br>
        <input type="number" id="temp-val" value="32"><br>

        <label>Tipo de Gas:</label><br>
        <select id="gas-orig">
            <option value="R22">R22</option>
            <option value="R410A">R410A</option>
            <option value="R134A">R134a</option>
            <option value="R32">R32</option>
            <option value="R600A">R600a</option>
        </select><br><br>

        <button onclick="calcularPresiones()">MOSTRAR IDEAL</button><br><br>

        <div>
            <div class="manometro" id="ideal-baja">0</div>
            <div class="manometro" id="ideal-alta" style="border-color: #f00; color: #f00;">0</div>
        </div>
        <p>BAJA / ALTA (PSI)</p>
    </div>

<script>
function calcularPresiones() {
    const tempAmb = parseFloat(document.getElementById('temp-val').value) || 0;
    const gas = document.getElementById('gas-orig').value;
    const tempCond = tempAmb + 17; 

    let idealBaja = 0;
    let idealAlta = 0;

    switch(gas) {
        case "R22":
            idealBaja = 65 + (tempAmb - 30) * 0.7; 
            idealAlta = tempCond * 5.62; 
            break;
        case "R410A":
            idealBaja = 118 + (tempAmb - 30) * 1.2;
            idealAlta = tempCond * 8.55;
            break;
        case "R134A":
            idealBaja = 8 + (tempAmb - 30) * 0.1; 
            idealAlta = tempCond * 2.88; 
            break;
        case "R32":
            idealBaja = 120 + (tempAmb - 30) * 1.3;
            idealAlta = tempCond * 8.85;
            break;
        case "R600A":
            idealBaja = 0.5; 
            idealAlta = tempCond * 1.58;
            break;
    }

    document.getElementById('ideal-baja').innerText = Math.round(idealBaja);
    document.getElementById('ideal-alta').innerText = Math.round(idealAlta);
}
</script>

</body>
</html>
