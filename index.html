<style>
    /* El nuevo estilo para el botón central */
    .ideal-center-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: -10px 0; /* Para que se meta un poco entre los manómetros */
        z-index: 10;
    }
    .ideal-btn {
        background: #39ff14;
        color: #000;
        border: none;
        padding: 10px 20px;
        border-radius: 50px; /* Forma de óvalo/pastilla */
        font-weight: 900;
        font-size: 14px;
        box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
        cursor: pointer;
        text-transform: uppercase;
    }
</style>

<div class="gauges-wrapper">
    <div class="gauges" style="padding-bottom: 5px;">
        <div class="gauge g-baja">
            <span style="font-size:11px; font-weight:900; color:#00e5ff;">BAJA</span>
            <span class="g-val" id="val-baja">62</span>
        </div>
        <div class="gauge g-alta">
            <span style="font-size:11px; font-weight:900; color:#ff5722;">ALTA</span>
            <span class="g-val" id="val-alta">185</span>
        </div>
    </div>

    <div class="ideal-center-container">
        <button class="ideal-btn" onclick="calcularPresiones()">
            📊 IDEAL: <span id="ideal-val">65 / 210</span>
        </button>
    </div>
</div>
