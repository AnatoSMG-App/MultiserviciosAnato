<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHA V36.2 + BOTÓN BTU</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Narrow', sans-serif; margin: 0; padding: 5px; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; }
        .app-v36 { width: 100%; max-width: 400px; border: 1px solid #222; padding-bottom: 25px; }

        /* CABECERA CON BOTÓN BTU NARANJA */
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 10px; }
        .gps-label { color: #00e5ff; font-size: 11px; font-weight: 900; }
        .btu-btn { background: #ff5722; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: 900; font-size: 12px; cursor: pointer; box-shadow: 0 4px #bf360c; }
        .btu-btn:active { box-shadow: 0 2px #bf360c; transform: translateY(2px); }

        /* TEMP AMBIENTE */
        .temp-row { display: flex; justify-content: flex-end; padding: 0 10px; margin-bottom: 10px; }
        .temp-box { border: 2px solid #39ff14; border-radius: 5px; padding: 4px 10px; background: #000; text-align: center; }
        .temp-val { font-size: 22px; font-weight: 900; color: #39ff14; }

        .brand-name { text-align: center; font-size: 19px; font-weight: 900; margin: 5px 0; }

        /* TABS */
        .tabs-v36 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 0 10px; margin-bottom: 15px; }
        .tab-v36 { padding: 12px 0; text-align: center; font-size: 12px; font-weight: 900; background: #111; border-radius: 4px; border-bottom: 4px solid #333; color: #555; }
        .tab-v36.aire { border-color: #00e5ff; color: #00e5ff; }
        .tab-v36.nev { border-color: #39ff14; color: #39ff14; }

        /* SELECTORES */
        .panel-gas { background: #0a0a0a; margin: 0 10px 15px 10px; padding: 15px; border: 1px solid #222; border-radius: 8px; }
        .row-gas { display: flex; align-items: center; gap: 8px; }
        .col-gas { flex: 1; }
        .col-gas label { display: block; font-size: 9px; color: #39ff14; font-weight: 900; margin-bottom: 5px; }
        select { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 8px; font-size: 15px; font-weight: 900; }
        .btn-check { background: #0055ff; color: white; border: none; padding: 10px; border-radius: 4px; margin-top: 15px; }

        /* MANOMETROS */
        .press-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px; margin-bottom: 15px; }
        .box-press { border: 3px solid; border-radius: 12px; padding: 15px 5px; text-align: center; background: #000; }
        .box-press span { display: block; font-size: 11px; font-weight: 900; margin-bottom: 5px; }
        .val-press { background: none; border: none; color: inherit; font-size: 40px; font-weight: 900; width: 100%; text-align: center; outline: none; }

        /* INFO STRIP */
        .strip-v36 { background: #051005; border-left: 8px solid #39ff14; padding: 10px; margin: 0 10px 15px 10px; }
        .strip-v36 div { font-size: 10px; font-weight: 900; color: #39ff14; }

        /* REPOSO */
        .reposo-v17 { border: 2px dashed #39ff14; margin: 0 10px; padding: 15px; border-radius: 15px; background: #050505; }
        .timer-v17 { display: flex; justify-content: space-around; align-items: center; text-align: center; }
        .clock-v17 { font-size: 28px; font-weight: 900; font-family: monospace; }
        .btn-play { width: 50px; height: 50px; border-radius: 50%; border: none; background: #1b5e20; color: white; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-v36">
    <div class="header-top">
        <div class="gps-label">📍 GPS: CONECTADO</div>
        <button class="btu-btn" onclick="location.href='calculadora_btu.html'">BTU 📏</button>
    </div>

    <div class="temp-row">
        <div class="temp-box">
            <div style="font-size:8px; color:#39ff14; font-weight:900;">AMB.</div>
            <div class="temp-val">25°C</div>
        </div>
    </div>

    <div class="brand-name">ANALIZADOR DE PRESIONES JHA</div>

    <div class="tabs-v36">
        <div class="tab-v36 aire">AIRES</div>
        <div class="tab-v36 nev">NEVERAS</div>
        <div class="tab-v36 auto">AUTO</div>
    </div>

    <div class="panel-gas">
        <div class="row-gas">
            <div class="col-gas">
                <label>GAS ORIG.</label>
                <select id="gas" onchange="upd()">
                    <option value="R410A" data-o="POE">R410A</option>
                    <option value="R22" data-o="MINERAL">R22</option>
                    <option value="R134a" data-o="POE/PAG">R134a</option>
                    <option value="R600a" data-o="MINERAL">R600a</option>
                </select>
            </div>
            <button class="btn-check">✔</button>
            <div class="col-gas">
                <label>REEMP.</label>
                <select>
                    <option>SIN REEMP.</option>
                    <option>MO29 (422D)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="press-grid">
        <div class="box-press" style="border-color:#00e5ff; color:#00e5ff;">
            <span>BAJA (PSI)</span>
            <input type="number" id="vb" class="val-press" value="110" oninput="meta()">
        </div>
        <div class="box-press" style="border-color:#ff3131; color:#ff3131;">
            <span>ALTA (PSI)</span>
            <input type="number" id="va" class="val-press" value="288" oninput="meta()">
        </div>
    </div>

    <div class="strip-v36">
        <div id="ideal">CALCULANDO IDEAL PARA: R410A</div>
        <div id="aceite">● ACEITE: POE | ● CARGA: LÍQUIDA</div>
    </div>

    <div class="reposo-v17">
        <div class="timer-v17">
            <div style="color:#00e5ff;">
                <div style="font-size:10px; font-weight:900;">IDEAL</div>
                <div id="cI" class="clock-v17">05:00</div>
                <div id="pI" style="font-size:14px; font-weight:900;">-- PSI</div>
                <div style="font-size:9px; color:#fff;">META: <span id="mT">--</span></div>
            </div>
            <button onclick="start()" class="btn-play">▶</button>
            <div style="color:#39ff14;">
                <div style="font-size:10px; font-weight:900;">REAL</div>
                <div id="cR" class="clock-v17">00:00</div>
                <div id="pR" style="font-size:14px; font-weight:900;">-- PSI</div>
                <div id="st" style="font-size:9px; font-weight:900;">READY</div>
            </div>
        </div>
    </div>
</div>

<script>
    let t, sR=0, sI=300, run=false;
    function meta(){
        let b=parseFloat(document.getElementById('vb').value)||0, a=parseFloat(document.getElementById('va').value)||0;
        document.getElementById('mT').innerText=((b+a)/2).toFixed(1);
    }
    function start(){
        if(run)return; run=true; sR=0; sI=300; meta();
        let b0=parseFloat(document.getElementById('vb').value), m0=parseFloat(document.getElementById('mT').innerText);
        t=setInterval(()=>{
            sR++;
            document.getElementById('cR').innerText=`${Math.floor(sR/60).toString().padStart(2,'0')}:${(sR%60).toString().padStart(2,'0')}`;
            document.getElementById('pR').innerText=(b0+((m0-b0)*(sR/300))).toFixed(1);
            if(sI>0){
                sI--;
                document.getElementById('cI').innerText=`${Math.floor(sI/60).toString().padStart(2,'0')}:${(sI%60).toString().padStart(2,'0')}`;
                document.getElementById('pI').innerText=(b0+((m0-b0)*((300-sI)/300))).toFixed(1);
            }
        },1000);
    }
    window.onload=meta;
    function upd(){ document.getElementById('ideal').innerText = "CALCULANDO IDEAL PARA: " + document.getElementById('gas').value; }
</script>
</body>
</html>
