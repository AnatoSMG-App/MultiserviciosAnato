<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHA V36.2 PRO FINAL</title>
    <style>
        /* ESTILO NEÓN AGRESIVO V36.2 */
        body { background-color: #000; color: #fff; font-family: 'Arial Narrow', sans-serif; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; }
        .v36-frame { width: 100%; max-width: 410px; border: 1px solid #111; padding-bottom: 20px; text-transform: uppercase; }

        /* HEADER SUPERIOR */
        .top-label { text-align: center; font-size: 10px; color: #444; font-weight: bold; margin-bottom: 8px; letter-spacing: 2px; }
        .header-v36 { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .gps-v36 { color: #00e5ff; font-size: 12px; font-weight: 900; text-shadow: 0 0 8px #00e5ff88; }
        .amb-v36 { border: 2px solid #39ff14; border-radius: 6px; padding: 4px 12px; background: #000; text-align: center; box-shadow: 0 0 12px #39ff1466; }

        .brand-v36 { text-align: center; font-size: 22px; font-weight: 900; color: #fff; margin: 15px 0; letter-spacing: -1px; }

        /* TABS ESTILO ORIGINAL */
        .tabs-v36 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 0 10px; margin-bottom: 20px; }
        .tab-v36 { padding: 12px 0; text-align: center; font-size: 14px; font-weight: 900; border-radius: 4px; background: #151515; border-bottom: 4px solid #333; color: #555; }
        .tab-v36.aire { border-color: #00e5ff; color: #00e5ff; box-shadow: inset 0 -5px 10px #00e5ff22; }
        .tab-v36.nev { border-color: #39ff14; color: #39ff14; }
        .tab-v36.auto { border-color: #ff3131; color: #ff3131; }

        /* SELECTORES */
        .panel-v36 { background: #0a0a0a; margin: 0 10px 20px 10px; padding: 12px; border: 1px solid #222; border-radius: 8px; }
        .row-v36 { display: flex; align-items: center; gap: 8px; }
        .col-v36 { flex: 1; }
        .col-v36 label { display: block; font-size: 10px; color: #39ff14; font-weight: 900; margin-bottom: 4px; }
        select { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 8px; font-size: 16px; font-weight: bold; outline: none; }
        .chk-v36 { background: #0055ff; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: 900; margin-top: 15px; box-shadow: 0 0 10px #0055ff66; }

        /* DISPLAYS DE PRESIÓN GIGANTES */
        .grid-v36 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 10px; margin-bottom: 20px; }
        .card-v36 { border: 3px solid; border-radius: 12px; padding: 18px 5px; text-align: center; background: #000; }
        .card-v36 span { display: block; font-size: 12px; font-weight: 900; margin-bottom: 10px; letter-spacing: 1px; }
        .input-v36 { background: none; border: none; color: inherit; font-size: 50px; font-weight: 900; width: 100%; text-align: center; outline: none; font-family: 'Arial Black', sans-serif; }

        /* STATUS STRIP */
        .strip-v36 { background: #051005; border-left: 8px solid #39ff14; padding: 12px; margin: 0 10px 20px 10px; }
        .strip-v36 div { font-size: 12px; font-weight: 900; color: #39ff14; margin-bottom: 4px; }

        /* MÓDULO DE REPOSO INTEGRADO */
        .reposo-v36 { border: 2px dashed #39ff14; margin: 0 10px; padding: 15px; border-radius: 15px; background: #050505; }
        .timer-v36 { display: flex; justify-content: space-around; align-items: center; text-align: center; }
        .clock-v36 { font-size: 32px; font-weight: 900; font-family: monospace; color: #fff; }
        .btn-go { width: 55px; height: 55px; border-radius: 50%; border: none; background: #1b5e20; color: #fff; font-size: 24px; box-shadow: 0 0 15px #39ff1444; cursor: pointer; }
    </style>
</head>
<body>

<div class="v36-frame">
    <div class="top-label">MULTISERVICIOS ANATO S.M.G.</div>
    
    <div class="header-v36">
        <div class="gps-v36">📍 GPS: CONECTADO</div>
        <div class="amb-v36">
            <div style="font-size:9px; color:#39ff14; font-weight:900;">AMB.</div>
            <div style="font-size:24px; font-weight:900; color:#39ff14;">25°C</div>
        </div>
    </div>

    <div class="brand-v36">ANALIZADOR DE PRESIONES JHA</div>

    <div class="tabs-v36">
        <div class="tab-v36 aire">AIRES</div>
        <div class="tab-v36">NEVERAS</div>
        <div class="tab-v36">AUTO</div>
    </div>

    <div class="panel-v36">
        <div class="row-v36">
            <div class="col-v36">
                <label>GAS ORIG.</label>
                <select id="g" onchange="upd()">
                    <option value="R410A" data-o="POE" data-f="5.8">R410A</option>
                    <option value="R22" data-o="MINERAL" data-f="3.8">R22</option>
                    <option value="R134a" data-o="POE/PAG" data-f="4.2">R134a</option>
                    <option value="R600a" data-o="MINERAL" data-f="3.1">R600a</option>
                </select>
            </div>
            <button class="chk-v36">✔</button>
            <div class="col-v36">
                <label>REEMP.</label>
                <select>
                    <option>SIN REEMP.</option>
                    <option>MO29 (422D)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="grid-v36">
        <div class="card-v36" style="border-color:#00e5ff; color:#00e5ff; box-shadow: 0 0 15px #00e5ff44;">
            <span>BAJA (PSI)</span>
            <input type="number" id="vb" class="input-v36" value="110" oninput="meta()">
        </div>
        <div class="card-v36" style="border-color:#ff3131; color:#ff3131; box-shadow: 0 0 15px #ff313144;">
            <span>ALTA (PSI)</span>
            <input type="number" id="va" class="input-v36" value="288" oninput="meta()">
        </div>
    </div>

    <div class="strip-v36">
        <div id="i-txt">CALCULANDO IDEAL PARA: R410A</div>
        <div id="o-txt">● ACEITE: POE | ● CARGA: LÍQUIDA</div>
    </div>

    <div class="reposo-v36">
        <div class="timer-v36">
            <div style="color:#00e5ff;">
                <div style="font-size:10px; font-weight:900;">IDEAL</div>
                <div id="cI" class="clock-v36">05:00</div>
                <div id="pI" style="font-size:16px; font-weight:900;">-- PSI</div>
                <div style="font-size:10px; color:#fff;">META: <span id="mT">199.0</span></div>
            </div>
            <button onclick="start()" class="btn-go">▶</button>
            <div style="color:#39ff14;">
                <div style="font-size:10px; font-weight:900;">REAL</div>
                <div id="cR" class="clock-v36">00:00</div>
                <div id="pR" style="font-size:16px; font-weight:900;">-- PSI</div>
                <div id="st" style="font-size:10px; font-weight:900;">READY</div>
            </div>
        </div>
    </div>
</div>

<script>
    let t, sR=0, sI=300, run=false;
    function meta(){
        let b=parseFloat(document.getElementById('vb').value)||0, a=parseFloat(document.getElementById('va').value)||0;
        document.getElementById('mT').innerText=((b+a)/2).toFixed(1);
    }
    function start(){
        if(run)return; run=true; sR=0; sI=300; meta();
        let b0=parseFloat(document.getElementById('vb').value), m0=parseFloat(document.getElementById('mT').innerText);
        t=setInterval(()=>{
            sR++;
            document.getElementById('cR').innerText=`${Math.floor(sR/60).toString().padStart(2,'0')}:${(sR%60).toString().padStart(2,'0')}`;
            document.getElementById('pR').innerText=(b0+((m0-b0)*(sR/300))).toFixed(1);
            if(sI>0){
                sI--;
                document.getElementById('cI').innerText=`${Math.floor(sI/60).toString().padStart(2,'0')}:${(sI%60).toString().padStart(2,'0')}`;
                document.getElementById('pI').innerText=(b0+((m0-b0)*((300-sI)/300))).toFixed(1);
            }
        },1000);
    }
    function upd(){
        let g=document.getElementById('gas');
        document.getElementById('i-txt').innerText="CALCULANDO IDEAL PARA: "+document.getElementById('g').value;
    }
    window.onload=meta;
</script>
</body>
</html>
