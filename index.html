<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anato S.M.G. Pro</title> <style>
        body { background: radial-gradient(circle, #1a1a1a, #000); color: #0f0; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 10px; }
        .container { border: 2px solid #333; border-radius: 15px; padding: 15px; background: rgba(0,0,0,0.8); box-shadow: 0 0 20px #0f0; position: relative; max-width: 500px; margin: auto; }
        .btn-unificar { position: absolute; top: 10px; right: 10px; background: rgba(0,255,0,0.2); color: #0f0; border: 1px solid #0f0; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7em; }
        .display { font-size: 2.2em; background: #000; border: 1px solid #0f0; margin: 10px 0; padding: 5px; color: #0f0; text-shadow: 0 0 10px #0f0; border-radius: 10px; }
        .diagnostic-panel { margin-top: 20px; padding: 10px; border-top: 2px dashed #0f0; background: rgba(0, 50, 0, 0.2); border-radius: 10px; }
        select, input { background: #222; color: #0f0; border: 1px solid #444; padding: 10px; margin: 5px; border-radius: 5px; font-size: 1em; }
        .btn-action { padding: 12px; background: #0f0; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        #veredicto-alertas { color: #ffae00; font-weight: bold; min-height: 40px; margin: 10px 0; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-unificar" onclick="window.location.href='dimensiones.html'">📏 DIMENSIONES</button>
    
    <h2 style="color: white; margin-bottom: 5px; font-size: 1.4em;">MULTISERVICIOS ANATO S.M.G.</h2>
    <p style="margin-top: 0; font-size: 0.8em; color: #aaa; letter-spacing: 2px;">REFRIGERACIÓN & ELECTRICIDAD</p>
    
    <div style="margin-top: 15px;">
        Temp. Ambiente: <br>
        <input type="number" id="temp-manual" value="30" style="font-size: 1.5em; width: 80px; text-align: center;"> °C
    </div>

    <div style="margin: 10px 0;">
        <label style="font-size: 0.9em;"><input type="checkbox" id="check-gps" onclick="toggleGPS()"> 📍 GPS: ANATO S.M.G. (Los Guayos)</label>
    </div>

    <div style="display:flex; flex-direction: column; align-items: center;">
        <select id="gas-select" onchange="calcularTodo()" style="width: 95%;">
            <optgroup label="Aires AC">
                <option value="R22">R22</option>
                <option value="R410A">R410A</option>
                <option value="R32">R32</option>
                <option value="R290">R290</option>
            </optgroup>
            <optgroup label="Reemplazos R22">
                <option value="MO29">MO29 (422D)</option>
                <option value="MO99">MO99 (438A)</option>
                <option value="417A">417A</option>
            </optgroup>
            <optgroup label="Neveras/Cavas">
                <option value="R134a">R134a</option>
                <option value="R600a">R600a</option>
                <option value="R404A">R404A</option>
            </optgroup>
            <optgroup label="Automotriz">
                <option value="R134a_Auto">R134a (Carro)</option>
                <option value="YF1234">YF1234 (Nuevo)</option>
            </optgroup>
        </select>
    </div>

    <div style="display:flex; justify-content:space-around; margin-top: 10px;">
        <div>BAJA (PSI)<br><div id="baja-psi" class="display">65</div></div>
        <div>ALTA (PSI)<br><div id="alta-psi" class="display">250</div></div>
    </div>

    <div id="veredicto-alertas">S.M.G. | Diagnóstico listo...</div>

    <div class="diagnostic-panel">
        <h4 style="margin: 5px 0; color: #0f0;">TEST DE FLUJO S.M.G.</h4>
        <div style="font-size: 0.8em;">Meta Reposo: <span id="reposo-meta" style="color:cyan">158</span> PSI</div>
        <div id="cronometro" style="font-size:1.8em; margin:8px; color: white;">00:00</div>
        <button id="btn-crono" class="btn-action" onclick="manejarCronometro()">INICIAR PRUEBA</button>
        <div id="veredicto-flujo" style="margin-top:10px; font-size: 0.8em;"></div>
    </div>
</div>

<script>
    let tempActual = 30;
    let activoGPS = false;
    let intervaloCrono;
    let tiempoInicio;

    document.getElementById('temp-manual').addEventListener('input', function() {
        if(!activoGPS) { tempActual = parseFloat(this.value) || 30; calcularTodo(); }
    });

    function toggleGPS() {
        activoGPS = document.getElementById('check-gps').checked;
        let inputTemp = document.getElementById('temp-manual');
        if(activoGPS) { tempActual = 34; inputTemp.value = 34; inputTemp.disabled = true; } 
        else { inputTemp.disabled = false; }
        calcularTodo();
    }

    function calcularTodo() {
        let t = tempActual;
        let gas = document.getElementById('gas-select').value;
        let b = 0, a = 0, r = 0;

        // Fórmulas calibradas para el calor de Venezuela
        switch(gas) {
            case "R22": b = t+32; a = (t*5.5)+115; r = (t*4)+38; break;
            case "R410A": b = t+85; a = (t*8.5)+180; r = (t*6)+60; break;
            case "R32": b = t+88; a = (t*9)+190; r = (t*6.5)+65; break;
            case "MO29": b = t+28; a = (t*5.2)+110; r = (t*3.8)+35; break;
            case "MO99": b = t+30; a = (t*5.4)+112; r = (t*3.9)+36; break;
            case "417A": b = t+26; a = (t*5.1)+108; r = (t*3.7)+34; break;
            case "R134a": b = (t*0.4)+4; a = (t*3.5)+85; r = (t*2.1)+15; break;
            case "R600a": b = (t*0.2)-2; a = (t*2)+45; r = (t*1.2)+5; break;
            case "R404A": b = t+92; a = (t*9.2)+190; r = (t*7)+70; break;
            case "R134a_Auto": b = 32; a = (t*6.2)+45; r = (t*3)+20; break;
            case "YF1234": b = 30; a = (t*6)+42; r = (t*2.8)+18; break;
            default: b = 60; a = 250; r = 150;
        }

        document.getElementById('baja-psi').innerText = Math.round(b);
        document.getElementById('alta-psi').innerText = Math.round(a);
        document.getElementById('reposo-meta').innerText = Math.round(r);
        document.getElementById('veredicto-alertas').innerHTML = `Analizando ${gas}... <br>Valores optimizados para Anato S.M.G.`;
    }

    function manejarCronometro() {
        let btn = document.getElementById('btn-crono');
        if(btn.innerText === "INICIAR PRUEBA") {
            tiempoInicio = Date.now();
            btn.innerText = "LLEGÓ A LA META";
            btn.style.background = "orange";
            intervaloCrono = setInterval(() => {
                let seg = Math.floor((Date.now() - tiempoInicio) / 1000);
                document.getElementById('cronometro').innerText = 
                    `${Math.floor(seg/60).toString().padStart(2,'0')}:${(seg%60).toString().padStart(2,'0')}`;
            }, 1000);
        } else {
            clearInterval(intervaloCrono);
            let s = Math.floor((Date.now() - tiempoInicio) / 1000);
            let v = document.getElementById('veredicto-flujo');
            if(s < 45) v.innerHTML = "🚨 <b>FALLO MECÁNICO:</b> Presión igualada demasiado rápido.";
            else if(s <= 180) v.innerHTML = "✅ <b>EQUIPO SANO:</b> Tiempo de ecualización óptimo.";
            else v.innerHTML = "🚨 <b>OBSTRUCCIÓN:</b> El capilar o filtro están frenando el paso.";
            btn.innerText = "INICIAR PRUEBA";
            btn.style.background = "#0f0";
        }
    }
    calcularTodo();
</script>
</body>
</html>
