<hr style="border: 1px solid #444; margin: 40px 0;">

<div id="modulo-reposo" style="background: #111; padding: 20px; border-radius: 20px; border: 2px solid #333; text-align: center; font-family: sans-serif;">
    <h3 style="color: #00ff00; letter-spacing: 2px; margin-bottom: 25px;">🧪 DIAGNÓSTICO DE REPOSO</h3>

    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div style="width: 42%;">
            <small style="color: #888;">META TEÓRICA</small>
            <div id="reloj-ideal" style="font-size: 2.2em; color: #00ff00; font-weight: bold; font-family: monospace;">00:00</div>
            <div id="psi-meta-box" style="margin-top: 15px; border-top: 1px solid #222; padding-top: 10px;">
                <span id="psi-teorico-anim" style="font-size: 1.5em; color: #00ff00;">--</span><br>
                <small style="color: #666;">PSI IDEAL</small>
            </div>
        </div>

        <div style="width: 16%; display: flex; flex-direction: column; gap: 20px; padding-top: 30px;">
            <button id="btn-start" onclick="iniciarPrueba()" style="background: none; border: none; font-size: 2.5em; cursor: pointer; filter: drop-shadow(0 0 5px #00ff00);">🟢</button>
            <button id="btn-stop" onclick="finalizarPrueba()" style="background: none; border: none; font-size: 2.5em; cursor: pointer; filter: drop-shadow(0 0 5px #ff0000);">🔴</button>
        </div>

        <div style="width: 42%;">
            <small style="color: #888;">TIEMPO DE CAMPO</small>
            <div id="reloj-real" style="font-size: 2.2em; color: #fff; font-weight: bold; font-family: monospace;">00:00</div>
            <div style="margin-top: 15px; border-top: 1px solid #222; padding-top: 10px;">
                <input type="number" id="psi-manual" placeholder="PSI Real" style="width: 80%; background: #222; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 8px; text-align: center; font-size: 1.1em;">
                <br><small style="color: #666;">VER MANÓMETRO</small>
            </div>
        </div>
    </div>

    <div id="consola-diagnostico" style="margin-top: 25px; background: #000; padding: 15px; border-radius: 12px; border: 1px solid #00ff00; min-height: 60px; display: flex; align-items: center; justify-content: center;">
        <p id="txt-diagnostico" style="color: #00ff00; font-weight: bold; margin: 0; font-size: 0.9em;">SISTEMA LISTO PARA ANÁLISIS</p>
    </div>
</div>

<div style="margin-top: 50px; padding-bottom: 50px; text-align: center;">
    <button onclick="window.location.href='calculadora_btu.html'" style="background: transparent; color: #ff8c00; border: 2px solid #ff8c00; padding: 18px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(255,140,0,0.3); width: 90%; font-size: 1em;">
        📐 IR A CALCULADORA VOLUMÉTRICA (BTU)
    </button>
    <p style="color: #555; font-size: 0.7em; margin-top: 10px;">S.M.G. ENGINEERING TOOLS v36</p>
</div>

<script>
let timerIdeal, timerReal;
let segundosIdeal, segundosReal;

function iniciarPrueba() {
    clearInterval(timerIdeal);
    clearInterval(timerReal);
    
    // Lógica de tiempo según Gas Seleccionado arriba
    const gas = document.getElementById('gasSelect').value;
    segundosIdeal = (gas === 'R410A' || gas === 'R32') ? 480 : 300; // 8 min o 5 min
    segundosReal = 0;

    // Calcular Meta PSI (Referencial basado en alta estimada)
    const tempAmb = parseFloat(document.getElementById('tempAmbiente').value) || 30;
    const psiMeta = Math.round(tempAmb * 5.5); // Factor de equilibrio estimado
    document.getElementById('psi-teorico-anim').innerText = psiMeta;

    document.getElementById('txt-diagnostico').innerHTML = "⏳ ANALIZANDO FLUJO DE GAS...";
    document.getElementById('consola-diagnostico').style.borderColor = "#00ff00";

    timerIdeal = setInterval(() => {
        if(segundosIdeal > 0) {
            segundosIdeal--;
            actualizarReloj('reloj-ideal', segundosIdeal);
        }
    }, 1000);

    timerReal = setInterval(() => {
        segundosReal++;
        actualizarReloj('reloj-real', segundosReal);
        if(segundosReal > (segundosIdeal + 120)) {
            document.getElementById('reloj-real').style.color = "#ff0000";
        }
    }, 1000);
}

function finalizarPrueba() {
    clearInterval(timerIdeal);
    clearInterval(timerReal);
    const gas = document.getElementById('gasSelect').value;
    const limite = (gas === 'R410A' || gas === 'R32') ? 480 : 300;

    let mensaje = "";
    if(segundosReal < 90) {
        mensaje = "⚠️ FALLA DE COMPRESIÓN: El gas igualó demasiado rápido (Bypass interno).";
        document.getElementById('consola-diagnostico').style.borderColor = "#ffcc00";
    } else if (segundosReal > limite + 60) {
        mensaje = "⚠️ COLESTEROL DETECTADO: Obstrucción parcial o capilar saturado. Flujo lento.";
        document.getElementById('consola-diagnostico').style.borderColor = "#ff0000";
    } else {
        mensaje = "✅ SISTEMA SANO: El tiempo de equilibrio es óptimo para este refrigerante.";
        document.getElementById('consola-diagnostico').style.borderColor = "#00ff00";
    }
    document.getElementById('txt-diagnostico').innerHTML = mensaje;
}

function actualizarReloj(id, segundos) {
    let m = Math.floor(segundos / 60);
    let s = segundos % 60;
    document.getElementById(id).innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}
</script>
