<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.H.A ANALIZADOR V3</title>
    <style>
        :root { --azul: #00f2ff; --rojo: #ff3131; --bg: #0a0a0a; --amarillo: #ffeb3b; --verde: #0f0; --gris: #333; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; display: flex; justify-content: center; }
        .container { background: #111; border: 2px solid var(--gris); border-radius: 15px; padding: 10px; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* ENCABEZADO ESTILO V36 */
        .header { text-align: center; border-bottom: 1px solid var(--gris); padding-bottom: 5px; margin-bottom: 8px; }
        .header h1 { font-size: 1.1rem; margin: 0; color: #fff; text-transform: uppercase; font-weight: 900; }
        .loc-info { font-size: 0.85rem; color: var(--azul); font-weight: bold; min-height: 18px; margin-top: 2px; }
        #clock { font-family: monospace; font-size: 1.1rem; color: #fff; font-weight: bold; }

        .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #222; }
        .app-title { color: var(--azul); font-weight: 900; font-size: 1.35rem; text-align: center; line-height: 1; text-transform: uppercase; flex: 1; letter-spacing: 1px; }
        
        .temp-box { background: #000; border: 2px solid var(--verde); padding: 5px 12px; border-radius: 8px; color: var(--verde); font-size: 1.8rem; font-weight: bold; cursor: pointer; text-align: right; }
        .temp-label { font-size: 0.6rem; color: #aaa; display: block; margin-bottom: -5px; font-weight: bold; }

        .tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .tab { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; cursor: pointer; border-bottom: 3px solid #000; }
        .tab.active { border-color: var(--azul); color: var(--azul); background: rgba(0,242,255,0.1); border-bottom: 3px solid var(--azul); }

        .gas-selection { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
        select { width: 100%; background: #222; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }

        .gauges { display: grid; grid-template-columns: 1fr 50px 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
        .gauge-box { background: #000; padding: 10px 5px; border-radius: 12px; text-align: center; border: 2px solid #333; cursor: pointer; }
        .p-val { font-size: 2.8rem; font-weight: bold; font-family: monospace; display: block; }
        .baja { color: var(--azul); border-color: var(--azul); }
        .alta { color: var(--rojo); border-color: var(--rojo); }

        .display { background: #000; border-left: 5px solid var(--verde); padding: 15px; border-radius: 8px; margin-bottom: 10px; min-height: 80px; }
        .msg { font-size: 1rem; font-weight: bold; line-height: 1.2; }

        /* MODULO REPOSO V3 (NUEVO MOTOR) */
        .reposo-box { background: #050505; border: 2px dashed var(--azul); border-radius: 15px; padding: 10px; margin-top: 10px; }
        .timer-grid { display: grid; grid-template-columns: 1fr 70px 1fr; gap: 5px; text-align: center; align-items: center; }
        .t-val { font-family: monospace; font-size: 1.4rem; font-weight: bold; }
        .btn-mando { width: 45px; height: 45px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; margin: 3px auto; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .keypad { display: none; grid-template-columns: repeat(6, 1fr); gap: 4px; background: #111; padding: 5px; border-radius: 8px; margin-top: 5px; }
        .btn { background: #333; color: #fff; padding: 18px 0; font-size: 1.4rem; border-radius: 5px; font-weight: bold; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚙️ MULTISERVICIOS ANATO S.M.G.</h1>
        <div id="loc" class="loc-info">📍 BUSCANDO SEÑAL...</div>
        <div id="clock">--:--:--</div>
    </div>

    <div class="status-row">
        <div style="text-align:center;"><input type="checkbox" id="gps" style="transform: scale(1.5);" onchange="toggleGPS()"><br><small style="font-weight: bold;">GPS</small></div>
        <div class="app-title">ANALIZADOR JHA<br>VERSIÓN 3</div>
        <div class="temp-box" onclick="setFoco('temp')">
            <span class="temp-label">AMB.</span>
            <span id="v-temp">30</span><small style="font-size:0.8rem">°C</small>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="setCat('aire', this)">AIRES</button>
        <button class="tab" onclick="setCat('nevera', this)">NEVERAS</button>
        <button class="tab" onclick="setCat('auto', this)">AUTO</button>
    </div>

        <div><small style="color:var(--azul);">GAS</small><select id="g-ori" onchange="run
