<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Narrow', sans-serif; margin: 0; padding: 10px; text-transform: uppercase; }
        .v28-container { width: 100%; max-width: 420px; margin: 0 auto; border: 1px solid #333; border-radius: 15px; background: #000; overflow: hidden; }

        /* CABECERA: ESPACIO PARA SMG Y BTU */
        .v28-header { padding: 15px; position: relative; border-bottom: 1px solid #222; }
        
        /* Ajustamos el ancho para que SMG no choque con el botón naranja */
        .empresa { text-align: left; font-size: 13px; color: #FFFFFF; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; width: 65%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .loc-display { text-align: left; color: #00e5ff; font-size: 12px; font-weight: 900; min-height: 18px; margin-bottom: 15px; text-shadow: 0 0 8px #00e5ff66; }

        .btu-float { position: absolute; top: 15px; right: 15px; background: #ff5722; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; font-weight: 900; font-size: 11px; text-decoration: none; box-shadow: 0 4px #bf360c; }

        .main-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

        /* GPS */
        .gps-side { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; min-width: 50px; }
        .gps-box { width: 22px; height: 22px; border: 2px solid #fff; background: #000; display: flex; align-items: center; justify-content: center; }
        .gps-active .gps-box { background: #fff; }
        .gps-active .gps-box::after { content: '✔'; color: #000; font-size: 18px; font-weight: 900; }
        .gps-lbl { font-size: 10px; font-weight: 900; }

        .jha-brand { flex: 1; text-align: center; color: #00e5ff; font-size: 16px; font-weight: 900; line-height: 1.1; }

        /* AMBIENTE: CUADRO DE TECLADO NUMÉRICO */
        .amb-side { border: 2px solid #39ff14; border-radius: 8px; padding: 6px; background: #051005; box-shadow: 0 0 10px #39ff1444; text-align: center; min-width: 75px; cursor: pointer; }
        .amb-lbl { font-size: 9px; color: #39ff14; font-weight: 900; display: block; }
        
        /* Quitamos flechas estorbosas del teclado */
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .amb-in { background: none; border: none; color: #39ff14; font-size: 24px; font-weight: 900; font-family: monospace; width: 45px; text-align: center; outline: none; }

        /* TABS */
        .tabs-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; background: #0a0a0a; }
        .tab { padding: 12px 0; text-align: center; font-size: 12px; font-weight: 900; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; cursor: pointer; color: #666; }
        .tab.active-aires { border-color: #00e5ff; color: #00e5ff; background: #00e5ff11; }
        .tab.active-neveras { border-color: #39ff14; color: #39ff14; background: #39ff1411; }
        .tab.active-auto { border-color: #ff3131; color: #ff3131; background: #ff313111; }
    </style>
</head>
<body>

<div class="v28-container">
    <div class="v28-header">
        <a href="calculadora_btu.html" class="btu-float">BTU 📏</a>
        <div class="empresa">MULTISERVICIOS ANATO S.M.G.</div>
        <div id="loc-display" class="loc-display">📍 BUSCANDO SEÑAL...</div>

        <div class="main-row">
            <div id="gps-btn" class="gps-side" onclick="toggleGPS()">
                <div class="gps-box"></div>
                <span class="gps-lbl">GPS</span>
            </div>
            <div class="jha-brand">ANALIZADOR DE<br>PRESIONES JHA</div>
            
            <div class="amb-side" onclick="document.getElementById('temp-val').focus(); document.getElementById('temp-val').select();">
                <span class="amb-lbl">AMB.</span>
                <div style="display: flex; align-items: center; justify-content: center;">
                    <input type="number" id="temp-val" class="amb-in" value="25" inputmode="numeric">
                    <span style="color:#39ff14; font-weight:900; font-size: 20px;">°C</span>
                </div>
            </div>
        </div>
    </div>

    <div class="tabs-row">
        <div id="tab-aires" class="tab active-aires" onclick="selectTab('aires')">AIRES</div>
        <div id="tab-neveras" class="tab" onclick="selectTab('neveras')">NEVERAS</div>
        <div id="tab-auto" class="tab" onclick="selectTab('auto')">AUTO</div>
    </div>
</div>

<script>
    function selectTab(mode) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-aires', 'active-neveras', 'active-auto'));
        document.getElementById('tab-' + mode).classList.add('active-' + mode);
    }

    async function toggleGPS() {
        const btn = document.getElementById('gps-btn');
        const locTxt = document.getElementById('loc-display');
        const tempIn = document.getElementById('temp-val');
        const isAct = btn.classList.toggle('gps-active');
        
        if(isAct) {
            locTxt.innerText = "📍 CONECTANDO GPS...";
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                        const data = await res.json();
                        const ciudad = data.address.city || data.address.town || "UBICACIÓN DETECTADA";
                        locTxt.innerText = `📍 UBICACIÓN: ${ciudad.toUpperCase()}`;
                        
                        const resW = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`);
                        const dataW = await resW.json();
                        tempIn.value = Math.round(dataW.current_weather.temperature);
                    } catch (e) { locTxt.innerText = "📍 UBICACIÓN: CARABOBO"; }
                });
            }
        } else {
            locTxt.innerText = "📍 BUSCANDO SEÑAL...";
        }
    }
</script>

</body>
</html>
