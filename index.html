<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.M.G. V36 - Analizador Profesional</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        .header { padding: 20px; border-bottom: 2px solid #0f0; margin-bottom: 20px; }
        .container { padding: 15px; max-width: 500px; margin: auto; border: 1px solid #333; border-radius: 20px; background: #050505; }
        .btn-smg { background: #0f0; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 80%; margin: 10px; cursor: pointer; }
        input, select { width: 70%; padding: 12px; margin: 10px; background: #111; color: #0f0; border: 1px solid #0f0; border-radius: 8px; }
        .gauge-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .gauge { border: 4px solid #0f0; border-radius: 50%; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; font-size: 1.8em; font-weight: bold; }
        .gauge.high { border-color: #f00; color: #f00; }
        .info-panel { font-size: 0.9em; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>MULTISERVICIOS ANATO S.M.G.</h2>
        <p>V36 - Diagnóstico Avanzado</p>
    </div>

    <div class="container">
        <div id="clima-section">
            <label>Temp. Ambiente (°C):</label><br>
            <input type="number" id="temp-val" value="32">
        </div>

        <label>Seleccione Refrigerante:</label><br>
        <select id="gas-orig">
            <optgroup label="Aires Acondicionados">
                <option value="R22">R22</option>
                <option value="R410A">R410A</option>
                <option value="R32">R32</option>
                <option value="R290">R290</option>
                <option value="R407C">R407C</option>
            </optgroup>
            <optgroup label="Neveras / Refrigeración">
                <option value="R134A">R134a</option>
                <option value="R600A">R600a</option>
                <option value="R12">R12 / Sustitutos</option>
                <option value="R404A">R404A</option>
            </optgroup>
        </select>

        <br>
        <button class="btn-smg" onclick="calcularPresiones()">CALCULAR IDEAL S.M.G.</button>

        <div class="gauge-container">
            <div>
                <div class="gauge" id="ideal-baja">0</div>
                <span>BAJA</span>
            </div>
            <div>
                <div class="gauge high" id="ideal-alta">0</div>
                <span>ALTA</span>
            </div>
        </div>

        <div class="info-panel">
            <button onclick="alert('GPS Activado - Localizando Valencia, Carabobo')">📍 UBICACIÓN GPS</button>
            <p>Estado del Sistema: <span style="color: #0f0;">Activo</span></p>
        </div>
    </div>

<script>
function calcularPresiones() {
    const tempAmb = parseFloat(document.getElementById('temp-val').value) || 0;
    const gas = document.getElementById('gas-orig').value;
    const tempCond = tempAmb + 17; 

    let baja = 0;
    let alta = 0;

    switch(gas) {
        case "R22":
            baja = 65 + (tempAmb - 30) * 0.7;
            alta = tempCond * 5.62;
            break;
        case "R410A":
            baja = 118 + (tempAmb - 30) * 1.2;
            alta = tempCond * 8.55;
            break;
        case "R32":
            baja = 120 + (tempAmb - 30) * 1.3;
            alta = tempCond * 8.85;
            break;
        case "R407C":
            baja = 75 + (tempAmb - 30) * 0.9;
            alta = tempCond * 6.80;
            break;
        case "R134A":
            baja = 8 + (tempAmb - 30) * 0.1;
            alta = tempCond * 2.88;
            break;
        case "R600A":
            baja = 0.5 + (tempAmb - 30) * 0.05;
            alta = tempCond * 1.58;
            break;
        case "R12":
            baja = 12 + (tempAmb - 30) * 0.2;
            alta = tempCond * 3.38;
            break;
        case "R404A":
            baja = 115 + (tempAmb - 30) * 1.1;
            alta = tempCond * 8.20;
            break;
        case "R290":
            baja = 68 + (tempAmb - 30) * 0.8;
            alta = tempCond * 5.38;
            break;
    }

    document.getElementById('ideal-baja').innerText = Math.round(baja);
    document.getElementById('ideal-alta').innerText = Math.round(alta);
}
</script>

</body>
</html>
