<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador J.H.A V40 Pro</title>
    <style>
        /* TU ADN ORIGINAL - COLORES Y ESTRUCTURA */
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; border: 2px solid #39ff14; border-radius: 15px; padding: 15px; box-shadow: 0 0 15px #39ff14; background: #1a1a1a; min-height: 95vh; position: relative; }
        
        /* CABECERA CORREGIDA */
        .header { text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px; }
        .header h1 { font-size: 16px; margin: 0; color: #39ff14; text-transform: uppercase; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; }
        
        /* BOTÓN BTU (EL PUENTE) */
        .btn-btu { background: #ff8c00; color: black; border: none; padding: 5px 12px; border-radius: 5px; font-weight: bold; text-decoration: none; cursor: pointer; box-shadow: 0 0 5px #ff8c00; }

        /* SECCIÓN DE DATOS (REPLICANDO TU APP) */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .box { border: 2px solid #444; border-radius: 10px; padding: 10px; text-align: center; }
        .box-baja { border-color: #00d4ff; }
        .box-alta { border-color: #ff4d4d; }
        .value { font-size: 32px; font-weight: bold; display: block; }
        .label { font-size: 12px; color: #aaa; text-transform: uppercase; }

        /* CONSOLA DE ALERTAS (LA LEY DE LOS 6 Y 10 PSI) */
        #panel-alertas { margin-top: 20px; padding: 10px; border-radius: 8px; background: #222; font-size: 13px; border-left: 5px solid #39ff14; }
        .alerta-item { margin-bottom: 5px; padding: 3px; }
        .critico { color: #ff4d4d; font-weight: bold; }
        .advertencia { color: #ffff00; }
        .seguro { color: #39ff14; }

        /* TEST DE REPOSO (EL CRONÓMETRO) */
        .test-reposo { margin-top: 20px; border: 1px dashed #39ff14; padding: 15px; border-radius: 10px; text-align: center; }
        .cronometro { font-size: 40px; font-family: monospace; color: #39ff14; margin: 10px 0; }
        .btn-test { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-start { background: #39ff14; color: black; }
        .btn-stop { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Multiservicios Anato S.M.G.</h1>
        <div class="info-row">
            <div>📍 Valencia - Los Guayos</div>
            <a href="dimensiones.html" class="btn-btu">📏 BTU</a>
        </div>
        <div style="font-size: 18px; margin-top: 5px;" id="reloj">00:00:00</div>
    </div>

    <div style="margin-bottom: 10px;">
        <label>GAS ORIG:</label>
        <select id="gasSelect" onchange="calcularTodo()" style="width: 100%; padding: 5px; background: #333; color: white; border: 1px solid #39ff14;">
            <option value="R22" data-ideal-baja="65" data-ideal-alta="250" data-aceite="MINERAL / ALQUILBENCENO">R22</option>
            <option value="R410A" data-ideal-baja="118" data-ideal-alta="380" data-aceite="SINTÉTICO (POE)">R410A</option>
            <option value="R134A" data-ideal-baja="30" data-ideal-alta="150" data-aceite="SINTÉTICO (PAG/POE)">R134A</option>
            <option value="R600A" data-ideal-baja="0" data-ideal-alta="60" data-aceite="MINERAL" data-inflamable="true">R600A (INFLAMABLE)</option>
        </select>
    </div>

    <div class="data-grid">
        <div class="box box-baja">
            <span class="label">Baja (PSI)</span>
            <input type="number" id="inputBaja" value="65" oninput="calcularTodo()" style="width: 80%; background: none; border: none; color: #00d4ff; font-size: 32px; text-align: center; font-weight: bold;">
        </div>
        <div class="box box-alta">
            <span class="label">Alta (PSI)</span>
            <input type="number" id="inputAlta" value="250" oninput="calcularTodo()" style="width: 80%; background: none; border: none; color: #ff4d4d; font-size: 32px; text-align: center; font-weight: bold;">
        </div>
    </div>

    <div id="panel-alertas">
        <div id="alertaBaja" class="alerta-item">--</div>
        <div id="alertaAlta" class="alerta-item">--</div>
        <div id="alertaGas" class="alerta-item">--</div>
    </div>

    <div class="test-reposo">
        <span class="label">TEST DE FLUJO / REPOSO</span>
        <div id="cronoDisplay" class="cronometro">00:00</div>
        <div id="psiDinamico" style="font-size: 20px; color: #00d4ff;">-- PSI</div>
        <button id="btnTest" class="btn-test btn-start" onclick="toggleTest()">INICIAR PRUEBA</button>
        <div id="veredicto" style="margin-top: 10px; font-weight: bold; font-size: 14px; color: #ffff00;"></div>
    </div>
</div>

<script>
    // RELOJ EN VIVO
    setInterval(() => {
        document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // LÓGICA DE LAS ALERTAS (LEY DE LOS 6 Y 10 PSI)
    function calcularTodo() {
        const gas = document.getElementById('gasSelect');
        const selected = gas.options[gas.selectedIndex];
        const idealBaja = parseFloat(selected.dataset.idealBaja);
        const idealAlta = parseFloat(selected.dataset.idealAlta);
        const baja = parseFloat(document.getElementById('inputBaja').value);
        const alta = parseFloat(document.getElementById('inputAlta').value);
        
        // Alerta Baja (6 PSI)
        const difBaja = baja - idealBaja;
        let msgBaja = `Baja: ${baja} PSI (Ideal: ${idealBaja}). `;
        if(Math.abs(difBaja) > 6) {
            document.getElementById('alertaBaja').className = "alerta-item critico";
            msgBaja += difBaja > 0 ? "⚠️ MUY ALTA" : "⚠️ MUY BAJA";
        } else {
            document.getElementById('alertaBaja').className = "alerta-item seguro";
            msgBaja += "✅ RANGO OK";
        }
        document.getElementById('alertaBaja').innerText = msgBaja;

        // Alerta Alta (10-15 PSI)
        const difAlta = alta - idealAlta;
        let msgAlta = `Alta: ${alta} PSI (Ideal: ${idealAlta}). `;
        if(difAlta >= 15) {
            document.getElementById('alertaAlta').className = "alerta-item critico";
            msgAlta += "🚨 CRÍTICO: CONDENSADOR/VENTILADOR";
        } else if(difAlta >= 10) {
            document.getElementById('alertaAlta').className = "alerta-item advertencia";
            msgAlta += "⚠️ VERIFICAR LIMPIEZA";
        } else {
            document.getElementById('alertaAlta').className = "alerta-item seguro";
            msgAlta += "✅ PRESIÓN ESTABLE";
        }
        document.getElementById('alertaAlta').innerText = msgAlta;

        // Aceite y Gas
        let msgGas = `Aceite: ${selected.dataset.aceite}`;
        if(selected.dataset.inflamable) {
            msgGas += " | 🚩 INFLAMABLE (CUIDADO)";
            document.getElementById('alertaGas').className = "alerta-item critico";
        } else {
            document.getElementById('alertaGas').className = "alerta-item seguro";
        }
        document.getElementById('alertaGas').innerText = msgGas;
    }

    // LÓGICA DEL CRONÓMETRO DE REPOSO
    let timer;
    let segundos = 0;
    let testActivo = false;
    let psiInicial = 0;

    function toggleTest() {
        const btn = document.getElementById('btnTest');
        if(!testActivo) {
            // INICIAR
            testActivo = true;
            segundos = 0;
            psiInicial = parseFloat(document.getElementById('inputBaja').value);
            btn.innerText = "PARAR PRUEBA";
            btn.className = "btn-test btn-stop";
            document.getElementById('veredicto').innerText = "Analizando estabilidad...";
            
            timer = setInterval(() => {
                segundos++;
                let min = Math.floor(segundos / 60).toString().padStart(2, '0');
                let seg = (segundos % 60).toString().padStart(2, '0');
                document.getElementById('cronoDisplay').innerText = `${min}:${seg}`;
                
                // Simulación visual de subida (solo como referencia)
                let subidaSimulada = psiInicial + (segundos * 0.1); 
                document.getElementById('psiDinamico').innerText = `${subidaSimulada.toFixed(1)} PSI`;
                
                if(segundos >= 300) toggleTest(); // Auto-stop a los 5 min
            }, 1000);
        } else {
            // PARAR Y DAR VEREDICTO
            testActivo = false;
            clearInterval(timer);
            btn.innerText = "INICIAR PRUEBA";
            btn.className = "btn-test btn-start";
            
            // Lógica de veredicto según tu experiencia
            if(segundos < 60) {
                document.getElementById('veredicto').innerText = "VEREDICTO: Equilibrio muy rápido. ¡Revisar Válvulas!";
            } else if(segundos > 240) {
                document.getElementById('veredicto').innerText = "VEREDICTO: Subida muy lenta. Posible Obstrucción.";
            } else {
                document.getElementById('veredicto').innerText = "VEREDICTO: Flujo dentro de parámetros normales.";
            }
        }
    }

    // Arrancar cálculos al cargar
    window.onload = calcularTodo;
</script>

</body>
</html>
