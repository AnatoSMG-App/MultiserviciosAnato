<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador Anato S.M.G.</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .brand { font-weight: bold; color: #333; font-size: 1.2em; }
        .btn-dim { background: #ff6600; color: white; border: none; padding: 8px 12px; border-radius: 5px; text-decoration: none; font-size: 0.8em; font-weight: bold; }
        
        .nav-buttons { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: #ddd; color: #555; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .nav-btn.active { background: #4CAF50; color: white; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.9em; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 15px; font-size: 1.5em; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; text-align: center; }

        .test-box { background: #e8f5e9; border: 1px solid #4CAF50; padding: 15px; border-radius: 10px; }
        .meta-text { font-size: 0.9em; font-weight: bold; color: #2e7d32; }
        .timer-text { font-size: 2.5em; font-weight: bold; margin: 10px 0; color: #333; }
        .btn-start { background: #4CAF50; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand">ANATO S.M.G.</div>
        <a href="dimensiones.html" class="btn-dim">📏 DIMENSIONES</a>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn active">AIRES</button>
        <button class="nav-btn">NEVERAS</button>
        <button class="nav-btn">AUTO</button>
    </div>

    <div class="input-group">
        <label>PRESIÓN DE BAJA (PSI)</label>
        <input type="number" id="baja" value="65">
    </div>

    <div class="input-group">
        <label>PRESIÓN DE ALTA (PSI)</label>
        <input type="number" id="alta" value="250">
    </div>

    <div class="test-box">
        <div class="meta-text">TEST DE REPOSO (META: 175 PSI)</div>
        <div id="reloj" class="timer-text">00:00</div>
        <button class="btn-start" onclick="toggleReloj()" id="btn-control">INICIAR CRONÓMETRO</button>
    </div>
</div>

<script>
    let segs = 0;
    let activo = false;
    let id;

    function toggleReloj() {
        const btn = document.getElementById('btn-control');
        if (!activo) {
            activo = true;
            btn.innerText = "PARAR PRUEBA";
            btn.style.background = "#f44336";
            id = setInterval(() => {
                segs++;
                let m = Math.floor(segs / 60).toString().padStart(2, '0');
                let s = (segs % 60).toString().padStart(2, '0');
                document.getElementById('reloj').innerText = `${m}:${s}`;
            }, 1000);
        } else {
            clearInterval(id);
            activo = false;
            btn.innerText = "REINICIAR";
            btn.style.background = "#4CAF50";
        }
    }
</script>

</body>
</html>
