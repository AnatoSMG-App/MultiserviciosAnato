<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.H.A ANALIZADOR V36 PRO - V8</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 420px; background: #000; padding-bottom: 20px; }
        
        /* CABECERA NEGRA ESTILO V36 */
        .top-nav { background: #111; padding: 15px; border-bottom: 2px solid #39ff14; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: bold; font-size: 16px; letter-spacing: 1px; }
        .btu-orange { background: #ff5722; color: white; border: none; padding: 6px 15px; border-radius: 5px; font-weight: bold; box-shadow: 0 3px #943115; }

        .location-bar { color: #00e5ff; font-size: 11px; padding: 8px 15px; font-weight: bold; background: #080808; }

        /* TABS DE COLORES V36 */
        .mode-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; padding: 10px; }
        .tab-btn { padding: 12px; font-weight: bold; font-size: 12px; text-align: center; border-radius: 4px; border: none; color: white; }
        .tab-aire { background: #005a7d; border-bottom: 4px solid #00d4ff; }
        .tab-nev { background: #006b2b; border-bottom: 4px solid #39ff14; }
        .tab-auto { background: #8b0000; border-bottom: 4px solid #ff3131; }

        /* SELECTORES GRISES V36 */
        .selection-area { background: #1a1a1a; margin: 10px; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .grid-selects { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .label-v36 { font-size: 10px; color: #39ff14; font-weight: bold; margin-bottom: 5px; display: block; }
        select { width: 100%; padding: 10px; background: #000; color: white; border: 1px solid #444; border-radius: 4px; }

        /* MANOMETROS CON ETIQUETA FLOTANTE */
        .gauge-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px 10px; }
        .gauge-box { border: 3px solid; border-radius: 12px; padding: 20px 10px; text-align: center; position: relative; background: #050505; }
        .floating-label { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #000; padding: 0 10px; font-size: 10px; font-weight: bold; }
        .gauge-val { background: none; border: none; color: inherit; font-size: 48px; font-weight: bold; width: 100%; text-align: center; font-family: 'Arial Black', sans-serif; }

        /* BARRA VERDE DE INFO */
        .green-status { background: #39ff14; color: black; padding: 8px 15px; font-weight: bold; font-size: 11px; display: flex; justify-content: space-between; margin: 10px 0; }

        /* RELOJES DE REPOSO (INTEGRADOS AL ESTILO) */
        .reposo-v8 { background: #0a0a0a; border: 1px solid #333; margin: 10px; padding: 15px; border-radius: 10px; }
        .clock-grid { display: grid; grid-template-columns: 1fr 80px 1fr; align-items: center; text-align: center; }
        .clock-v { font-size: 26px; font-weight: bold; font-family: monospace; }
        .btn-play-v8 { width: 60px; height: 60px; background: #1b5e20; border: 2px solid #39ff14; border-radius: 50%; color: white; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-nav">
        <span class="brand">J.H.A ANALIZADOR</span>
        <button class="btu-orange">BTU 📏</button>
    </div>

    <div class="location-bar">📍 LOS GUAYOS - VALENCIA | 2026</div>

    <div class="mode-tabs">
        <div class="tab-btn tab-aire">AIRES</div>
        <div class="tab-btn tab-nev">NEVERAS</div>
        <div class="tab-btn tab-auto">AUTO</div>
    </div>

    <div class="selection-area">
        <div class="grid-selects">
            <div>
                <span class="label-v36">GAS ORIG.</span>
                <select id="gas" onchange="calc()">
                    <option value="R22" data-f="3.8">R22</option>
                    <option value="R410A" data-f="5.8">R410A</option>
                </select>
            </div>
            <div>
                <span class="label-v36">REEMP. ☑</span>
                <select>
                    <option>MO29 (422D)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="gauge-section">
        <div class="gauge-box" style="border-color:#00e5ff; color:#00e5ff;">
            <span class="floating-label">BAJA (PSI)</span>
            <input type="number" id="b" class="gauge-val" value="65" oninput="meta()">
        </div>
        <div class="gauge-box" style="border-color:#ff3131; color:#ff3131;">
            <span class="floating-label">ALTA (PSI)</span>
            <input type="number" id="a" class="gauge-val" value="250" oninput="meta()">
        </div>
    </div>

    <div class="green-status">
        <span>ACEITE: MINERAL / AB</span>
        <span>CARGA: GASEOSA</span>
    </div>

    <div class="reposo-v8">
        <div class="clock-grid">
            <div style="color:#00e5ff;">
                <div style="font-size:9px;">IDEAL</div>
                <div id="cI" class="clock-v">05:00</div>
                <div id="pI" style="font-size:14px;">-- PSI</div>
                <div style="font-size:8px;">META: <span id="mT">--</span></div>
            </div>
            <div>
                <button onclick="start()" class="btn-play-v8">▶</button>
            </div>
            <div style="color:#39ff14;">
                <div style="font-size:9px;">REAL</div>
                <div id="cR" class="clock-v">00:00</div>
                <div id="pR" style="font-size:14px;">-- PSI</div>
                <div style="font-size:8px;" id="st">READY</div>
            </div>
        </div>
    </div>
</div>

<script>
    let t, sR=0, sI=300, run=false;
    function meta(){
        let vb=parseFloat(document.getElementById('b').value)||0, va=parseFloat(document.getElementById('a').value)||0;
        document.getElementById('mT').innerText=((vb+va)/2).toFixed(1);
    }
    function start(){
        if(run)return; run=true; sR=0; sI=300; meta();
        let b0=parseFloat(document.getElementById('b').value), m0=parseFloat(document.getElementById('mT').innerText);
        t=setInterval(()=>{
            sR++;
            document.getElementById('cR').innerText=`${Math.floor(sR/60).toString().padStart(2,'0')}:${(sR%60).toString().padStart(2,'0')}`;
            document.getElementById('pR').innerText=(b0+((m0-b0)*(sR/300))).toFixed(1);
            if(sI>0){
                sI--;
                document.getElementById('cI').innerText=`${Math.floor(sI/60).toString().padStart(2,'0')}:${(sI%60).toString().padStart(2,'0')}`;
                document.getElementById('pI').innerText=(b0+((m0-b0)*((300-sI)/300))).toFixed(1);
            }
            if(sR===480) { document.getElementById('st').innerText="⚠️ COLESTEROL"; document.getElementById('cR').style.color="#ff3131"; }
        },1000);
    }
    window.onload=meta;
</script>
</body>
</html>
