<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALIZADOR JHA V36.2</title>
    <style>
        :root { --azul: #00f2ff; --rojo: #ff3131; --bg: #0a0a0a; --amarillo: #ffeb3b; --verde: #0f0; --gris: #333; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; display: flex; justify-content: center; }
        .container { background: #111; border: 2px solid var(--gris); border-radius: 15px; padding: 10px; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .header { text-align: center; border-bottom: 1px solid var(--gris); padding-bottom: 5px; margin-bottom: 8px; }
        .header h1 { font-size: 1.1rem; margin: 0; color: #fff; text-transform: uppercase; font-weight: 900; }
        .loc-info { font-size: 0.85rem; color: var(--azul); font-weight: bold; min-height: 18px; margin-top: 2px; }
        #clock { font-family: monospace; font-size: 1.1rem; color: #fff; font-weight: bold; }
        .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #222; }
        .app-title { color: var(--azul); font-weight: 900; font-size: 1.1rem; text-align: center; line-height: 1.1; text-transform: uppercase; flex: 1; letter-spacing: 1px; padding: 0 5px; }
        .temp-box { background: #000; border: 2px solid var(--verde); padding: 4px 10px; border-radius: 8px; color: var(--verde); font-size: 1.5rem; font-weight: bold; cursor: pointer; text-align: right; }
        .temp-label { font-size: 0.55rem; color: #aaa; display: block; margin-bottom: -4px; font-weight: bold; text-transform: uppercase; }
        .tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .tab { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; cursor: pointer; border-bottom: 3px solid #000; }
        .tab.active { border-color: var(--azul); color: var(--azul); background: rgba(0,242,255,0.1); border-bottom: 3px solid var(--azul); }
        .gas-selection { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
        select { width: 100%; background: #222; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
        .warn-gas { grid-column: span 2; color: var(--rojo); font-weight: 900; font-size: 0.8rem; text-align: center; display: none; margin-top: 5px; background: rgba(255,0,0,0.15); padding: 5px; border-radius: 5px; border: 1px solid var(--rojo); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .gauges { display: grid; grid-template-columns: 1fr 50px 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
        .gauge-box { background: #000; padding: 10px 5px; border-radius: 12px; text-align: center; border: 2px solid #333; cursor: pointer; }
        .p-val { font-size: 2.8rem; font-weight: bold; font-family: monospace; display: block; }
        .baja { color: var(--azul); border-color: var(--azul); }
        .alta { color: var(--rojo); border-color: var(--rojo); }
        .display { background: #000; border-left: 5px solid var(--verde); padding: 15px; border-radius: 8px; margin-bottom: 10px; min-height: 80px; box-shadow: inset 0 0 10px rgba(0,255,0,0.1); }
        .msg { font-size: 1.1rem; font-weight: bold; line-height: 1.2; }
        .tags { font-size: 0.85rem; color: var(--amarillo); margin-top: 10px; border-top: 1px solid #222; padding-top: 8px; font-weight: bold; }
        .keypad { display: none; grid-template-columns: repeat(6, 1fr); gap: 4px; background: #111; padding: 5px; border-radius: 8px; margin-top: 5px; }
        .btn { background: #333; color: #fff; padding: 18px 0; font-size: 1.4rem; border-radius: 5px; font-weight: bold; text-align: center; border-bottom: 3px solid #000; cursor: pointer; }
        .btn:active { background: var(--azul); color: #000; transform: translateY(2px); }
        .btn-ok { grid-column: span 6; background: var(--verde); color: #000; font-size: 1rem; padding: 15px; margin-top: 5px; font-weight: 900; text-transform: uppercase; border: none; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚙️ MULTISERVICIOS ANATO S.M.G.</h1>
        <div id="loc" class="loc-info">📍 BUSCANDO SEÑAL...</div>
        <div id="clock">--:--:--</div>
    </div>

    <div class="status-row">
        <div style="text-align:center;"><input type="checkbox" id="gps" style="transform: scale(1.5);" onchange="toggleGPS()"><br><small style="font-size:0.6rem; font-weight: bold;">GPS</small></div>
        <div class="app-title">ANALIZADOR DE<br>PRESIONES JHA</div>
        
        <div style="display: flex; flex-direction: column; gap: 4px;">
            <div class="temp-box" style="border-color: var(--amarillo); color: var(--amarillo);" onclick="setFoco('const')">
                <span class="temp-label">CONST.</span>
                <span id="v-const">17</span><small style="font-size:0.7rem">K</small>
            </div>
            <div class="temp-box" onclick="setFoco('temp')">
                <span class="temp-label">AMB.</span>
                <span id="v-temp">30</span><small style="font-size:0.8rem">°C</small>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="setCat('aire', this)">AIRES</button>
        <button class="tab" onclick="setCat('nevera', this)">NEVERAS</button>
        <button class="tab" onclick="setCat('auto', this)">AUTO</button>
    </div>

    <div class="gas-selection">
        <div><small style="color:var(--azul); font-weight: bold;">GAS ORIG.</small><select id="g-ori" onchange="updateReemp()"></select></div>
        <div><small style="color:var(--rojo); font-weight: bold;">REEMP. <input type="checkbox" id="use-reemp" onchange="toggleReemp()"></small><select id="g-reemp" disabled onchange="run()"></select></div>
        <div id="warn" class="warn-gas">⚠️ PRECAUCIÓN: GAS INFLAMABLE EXTREMO</div>
    </div>

    <div class="gauges">
        <div class="gauge-box baja" onclick="setFoco('baja')"><small style="font-weight: bold;">BAJA (PSI)</small><span id="v-baja" class="p-val">0</span></div>
        <div style="text-align:center"><input type="checkbox" id="ideal" checked style="transform: scale(1.3);" onchange="run()"><br><small style="font-weight: bold;">IDEAL</small></div>
        <div class="gauge-box alta" onclick="setFoco('alta')"><small style="font-weight: bold;">
