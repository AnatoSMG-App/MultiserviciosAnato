<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALIZADOR JHA V36.2 PRO - V11</title>
    <style>
        :root { --neon: #39ff14; --cyan: #00e5ff; --red: #ff3131; --bg: #000; --panel: #141414; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .v36-container { width: 100%; max-width: 420px; background: var(--bg); border: 1px solid #333; padding-bottom: 30px; }
        
        /* HEADER SUPERIOR */
        .top-header { text-align: center; font-size: 10px; color: #666; letter-spacing: 2px; margin-bottom: 10px; padding-top: 5px; }
        .nav-row { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; margin-bottom: 15px; }
        .gps-btn { color: var(--cyan); font-size: 12px; font-weight: bold; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; background: #0a0a0a; }
        .temp-amb-box { border: 2px solid var(--neon); border-radius: 10px; padding: 5px 12px; background: #051505; text-align: center; box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }
        
        .main-app-title { text-align: center; font-size: 18px; font-weight: bold; margin: 15px 0; letter-spacing: 1px; }

        /* TABS V36 ESTILO REAL */
        .v36-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 15px; margin-bottom: 20px; }
        .v36-tab { padding: 14px; text-align: center; font-weight: bold; font-size: 12px; border-radius: 8px; background: #1a1a1a; border-bottom: 4px solid #444; color: #888; }
        .v36-tab.active-aire { border-color: var(--cyan); color: var(--cyan); background: #0b1618; }
        .v36-tab.active-nev { border-color: var(--neon); color: var(--neon); background: #0b180b; }
        .v36-tab.active-auto { border-color: var(--red); color: var(--red); background: #180b0b; }

        /* SELECTORES EN FILA */
        .selectors-v36 { background: #0a0a0a; margin: 0 15px 15px 15px; padding: 15px; border-radius: 12px; border: 1px solid #222; }
        .sel-grid { display: flex; align-items: center; gap: 10px; }
        .sel-item { flex: 1; }
        .sel-item label { display: block; font-size: 9px; color: var(--neon); font-weight: bold; margin-bottom: 5px; }
        select { width: 100%; background: #000; color: white; border: 1px solid #444; padding: 10px; border-radius: 6px; font-size: 14px; outline: none; }
        .check-btn { background: #007bff; color: white; border: none; padding: 8px; border-radius: 5px; margin-top: 15px; font-weight: bold; }

        /* CUADROS DE PRESIÓN V36 */
        .press-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; margin-bottom: 20px; }
        .p-box { border: 3px solid; border-radius: 15px; padding: 20px 10px; text-align: center; background: #000; box-shadow: inset 0 0 20px rgba(0,0,0,1); }
        .p-box span { display: block; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
        .p-input { background: none; border: none; color: inherit; font-size: 38px; font-weight: bold; width: 100%; text-align: center; outline: none; font-family: monospace; }

        /* FRANJA DE INFO */
        .info-strip { background: #0a140a; border-left: 6px solid var(--neon); padding: 12px 15px; margin: 0 15px 20px 15px; border-radius: 0 8px 8px 0; }
        .info-strip div { font-size: 11px; font-weight: bold; color: var(--neon); margin-bottom: 4px; }

        /* MODULO DE REPOSO (INTEGRADO ABAJO) */
        .reposo-pro { background: #080808; border-top: 2px solid #222; padding: 20px 15px; margin-top: 10px; }
        .timer-display { display: flex; justify-content: space-around; align-items: center; text-align: center; }
        .clock-v { font-size: 28px; font-weight: bold; font-family: 'Courier New', monospace; }
        .play-circle { width: 60px; height: 60px; border-radius: 50%; border: none; background: #2e7d32; color: white; font-size: 24px; box-shadow: 0 0 15px rgba(46, 125, 50, 0.4); }
    </style>
</head>
<body>

<div class="v36-container">
    <div class="top-header">MULTISERVICIOS ANATO S.M.G.</div>
    
    <div class="nav-row">
        <div class="gps-btn">📍 GPS: CONECTADO</div>
        <div class="temp-amb-box" onclick="let n=prompt('Temp Ambiente:',25); if(n) document.getElementById('vT').innerText=n;">
            <div style="font-size:9px; color:var(--neon);">AMB.</div>
            <div style="font-size:20px; font-weight:bold; color:var(--neon);"><span id="vT">25</span>°C</div>
        </div>
    </div>

    <div class="main-app-title">ANALIZADOR DE PRESIONES JHA</div>

    <div class="v36-tabs">
        <div class="v36-tab active-aire">AIRES</div>
        <div class="v36-tab">NEVERAS</div>
        <div class="v36-tab">AUTO</div>
    </div>

    <div class="selectors-v36">
        <div class="sel-grid">
            <div class="sel-item">
                <label>GAS ORIG.</label>
                <select id="gas" onchange="actualizar()">
                    <option value="R410A" data-f="5.8" data-oil="POE">R410A</option>
                    <option value="R22" data-f="3.8" data-oil="MINERAL">R22</option>
                </select>
            </div>
            <button class="check-btn">✔</button>
            <div class="sel-item">
                <label>REEMP.</label>
                <select>
                    <option>SIN REEMP.</option>
                    <option>MO29 (422D)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="press-grid">
        <div class="p-box" style="border-color: var(--cyan); color: var(--cyan);">
            <span>BAJA (PSI)</span>
            <input type="number" id="vB" class="p-input" value="110" oninput="meta()">
        </div>
        <div class="p-box" style="border-color: var(--red); color: var(--red);">
            <span>ALTA (PSI)</span>
            <input type="number" id="vA" class="p-input" value="288" oninput="meta()">
        </div>
    </div>

    <div class="info-strip">
        <div id="ideal-txt">CALCULANDO IDEAL PARA: R410A</div>
        <div id="aceite-txt">● ACEITE: POE | ● CARGA: LÍQUIDA</div>
    </div>

    <div class="reposo-pro">
        <div class="timer-display">
            <div style="color:var(--cyan);">
                <div style="font-size:10px;">IDEAL</div>
                <div id="cI" class="clock-v">05:00</div>
                <div id="pI" style="font-size:14px;">-- PSI</div>
                <div style="font-size:9px; color:white;">META: <span id="mT">199.0</span></div>
            </div>
            <button onclick="start()" class="play-circle">▶</button>
            <div style="color:var(--neon);">
                <div style="font-size:10px;">REAL</div>
                <div id="cR" class="clock-v">00:00</div>
                <div id="pR" style="font-size:14px;">-- PSI</div>
                <div id="st" style="font-size:9px;">READY</div>
            </div>
        </div>
    </div>
</div>

<script>
    let t, sR=0, sI=300, run=false;
    function meta(){
        let b=parseFloat(document.getElementById('vB').value)||0, a=parseFloat(document.getElementById('vA').value)||0;
        document.getElementById('mT').innerText=((b+a)/2).toFixed(1);
    }
    function start(){
        if(run)return; run=true; sR=0; sI=300; meta();
        let b0=parseFloat(document.getElementById('vB').value), m0=parseFloat(document.getElementById('mT').innerText);
        t=setInterval(()=>{
            sR++;
            document.getElementById('cR').innerText=`${Math.floor(sR/60).toString().padStart(2,'0')}:${(sR%60).toString().padStart(2,'0')}`;
            document.getElementById('pR').innerText=(b0+((m0-b0)*(sR/300))).toFixed(1);
            if(sI>0){
                sI--;
                document.getElementById('cI').innerText=`${Math.floor(sI/60).toString().padStart(2,'0')}:${(sI%60).toString().padStart(2,'0')}`;
                document.getElementById('pI').innerText=(b0+((m0-b0)*((300-sI)/300))).toFixed(1);
            }
        },1000);
    }
    window.onload=meta;
</script>
</body>
</html>
