<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALIZADOR JHA V36.2 PRO</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .v36-box { width: 100%; max-width: 400px; background: #000; border: 2px solid #333; border-radius: 15px; padding: 15px; position: relative; }
        
        /* TOP INFO */
        .top-info { text-align: center; font-size: 10px; color: #aaa; margin-bottom: 10px; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .gps-box { display: flex; align-items: center; gap: 5px; color: #00e5ff; font-size: 11px; font-weight: bold; }
        .amb-box { border: 2px solid #39ff14; border-radius: 8px; padding: 5px 10px; text-align: center; background: #051a05; }
        
        /* TITULO PRINCIPAL */
        .main-title { text-align: center; color: #fff; font-size: 18px; font-weight: bold; margin: 10px 0; text-transform: uppercase; }

        /* TABS V36 */
        .tabs-v36 { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-v36 { flex: 1; padding: 10px; text-align: center; font-weight: bold; font-size: 12px; background: #1a1a1a; border-radius: 5px; border-bottom: 3px solid #444; }
        .tab-v36.active-a { border-color: #00e5ff; color: #00e5ff; }
        .tab-v36.active-n { border-color: #39ff14; color: #39ff14; }
        .tab-v36.active-au { border-color: #ff3131; color: #ff3131; }

        /* SELECTORES */
        .sel-container { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }
        .sel-row { display: flex; align-items: center; gap: 8px; }
        .sel-item { flex: 1; }
        .sel-item label { display: block; font-size: 9px; color: #39ff14; font-weight: bold; margin-bottom: 4px; }
        select { width: 100%; background: #000; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; font-size: 14px; }
        .check-btn { background: #007bff; border: none; padding: 5px; border-radius: 4px; color: white; margin-top: 15px; }

        /* PRESIONES V36 */
        .press-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .p-box-v36 { border: 3px solid; border-radius: 12px; padding: 15px 5px; text-align: center; background: #000; }
        .p-box-v36 span { display: block; font-size: 10px; font-weight: bold; margin-bottom: 5px; }
        .p-input { background: none; border: none; color: inherit; font-size: 32px; font-weight: bold; width: 100%; text-align: center; outline: none; }

        /* BARRA INFO VERDE */
        .info-strip { background: #0e1d0e; border-left: 5px solid #39ff14; padding: 10px; margin-bottom: 15px; }
        .info-strip div { font-size: 10px; font-weight: bold; color: #39ff14; margin-bottom: 3px; }

        /* REPOSO V10 - EL NUEVO MODULO */
        .reposo-v10 { border: 2px dashed #39ff14; border-radius: 15px; padding: 15px; background: #050505; }
        .timer-display { display: flex; justify-content: space-around; align-items: center; text-align: center; }
        .clock-num { font-size: 24px; font-weight: bold; font-family: monospace; }
        .play-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #28a745; color: white; font-size: 20px; }
    </style>
</head>
<body>

<div class="v36-box">
    <div class="top-info">MULTISERVICIOS ANATO S.M.G.</div>
    
    <div class="header-row">
        <div class="gps-box">
            <input type="checkbox" checked> <span>GPS: CONECTADO</span>
        </div>
        <div class="amb-box">
            <div style="font-size:8px; color:#39ff14;">AMB.</div>
            <div style="font-size:18px; font-weight:bold; color:#39ff14;">25<small>°C</small></div>
        </div>
    </div>

    <div class="main-title">ANALIZADOR DE PRESIONES JHA</div>

    <div class="tabs-v36">
        <div class="tab-v36 active-a">AIRES</div>
        <div class="tab-v36">NEVERAS</div>
        <div class="tab-v36">AUTO</div>
    </div>

    <div class="sel-container">
        <div class="sel-row">
            <div class="sel-item">
                <label>GAS ORIG.</label>
                <select id="g" onchange="calc()">
                    <option value="R410A" data-f="5.8">R410A</option>
                    <option value="R22" data-f="3.8">R22</option>
                </select>
            </div>
            <button class="check-btn">✔</button>
            <div class="sel-item">
                <label>REEMP.</label>
                <select>
                    <option>SIN REEMP.</option>
                    <option>MO29 (422D)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="press-grid">
        <div class="p-box-v36" style="border-color:#00e5ff; color:#00e5ff;">
            <span>BAJA (PSI)</span>
            <input type="number" id="vb" class="p-input" value="110" oninput="meta()">
        </div>
        <div class="p-box-v36" style="border-color:#ff3131; color:#ff3131;">
            <span>ALTA (PSI)</span>
            <input type="number" id="va" class="p-input" value="288" oninput="meta()">
        </div>
    </div>

    <div class="info-strip">
        <div id="ideal-txt">CALCULANDO IDEAL PARA: R410A</div>
        <div id="aceite-txt">● ACEITE: POE | ● CARGA: LÍQUIDA</div>
    </div>

    <div class="reposo-v10">
        <div class="timer-display">
            <div style="color:#00e5ff;">
                <div style="font-size:9px;">IDEAL</div>
                <div id="cI" class="clock-num">05:00</div>
                <div id="pI" style="font-size:12px;">-- PSI</div>
                <div style="font-size:8px; color:#fff;">META: <span id="mT">--</span></div>
            </div>
            <button onclick="start()" class="play-btn">▶</button>
            <div style="color:#39ff14;">
                <div style="font-size:9px;">REAL</div>
                <div id="cR" class="clock-num">00:00</div>
                <div id="pR" style="font-size:12px;">-- PSI</div>
                <div id="st" style="font-size:8px;">READY</div>
            </div>
        </div>
    </div>
</div>

<script>
    let t, sR=0, sI=300, run=false;
    function meta(){
        let b=parseFloat(document.getElementById('vb').value)||0, a=parseFloat(document.getElementById('va').value)||0;
        document.getElementById('mT').innerText=((b+a)/2).toFixed(1);
    }
    function start(){
        if(run)return; run=true; sR=0; sI=300; meta();
        let b0=parseFloat(document.getElementById('vb').value), m0=parseFloat(document.getElementById('mT').innerText);
        t=setInterval(()=>{
            sR++;
            document.getElementById('cR').innerText=`${Math.floor(sR/60).toString().padStart(2,'0')}:${(sR%60).toString().padStart(2,'0')}`;
            document.getElementById('pR').innerText=(b0+((m0-b0)*(sR/300))).toFixed(1);
            if(sI>0){
                sI--;
                document.getElementById('cI').innerText=`${Math.floor(sI/60).toString().padStart(2,'0')}:${(sI%60).toString().padStart(2,'0')}`;
                document.getElementById('pI').innerText=(b0+((m0-b0)*((300-sI)/300))).toFixed(1);
            }
        },1000);
    }
    window.onload=meta;
</script>
</body>
</html>
