<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Narrow', sans-serif; margin: 0; padding: 10px; text-transform: uppercase; }
        .v34-container { width: 100%; max-width: 420px; margin: 0 auto; border: 1px solid #333; border-radius: 15px; background: #0a0a0a; overflow: hidden; padding-bottom: 20px; }

        /* CABECERA */
        .header { padding: 15px; position: relative; border-bottom: 1px solid #222; }
        .empresa { font-size: 14px; font-weight: 900; color: #fff; width: 70%; }
        .btu-btn { position: absolute; top: 15px; right: 15px; background: #ff5722; color: #fff; padding: 8px 12px; border-radius: 6px; font-weight: 900; font-size: 11px; text-decoration: none; }

        .main-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        
        /* AMBIENTE (EL CONTROLADOR) */
        .amb-box { border: 2px solid #39ff14; border-radius: 8px; padding: 5px; background: #051005; text-align: center; min-width: 90px; }
        .amb-in { background: none; border: none; color: #39ff14; font-size: 28px; font-weight: 900; width: 55px; text-align: center; outline: none; }

        /* TABS */
        .tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; }
        .tab { padding: 12px 0; text-align: center; font-size: 12px; font-weight: 900; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; cursor: pointer; color: #666; }
        .active-aires { border-color: #00e5ff; color: #00e5ff; }

        /* GASES */
        .gas-section { display: grid; grid-template-columns: 1fr 45px 1fr; gap: 10px; padding: 0 15px; align-items: center; }
        .sel-wrap { background: #1a1a1a; border: 2px solid #444; border-radius: 8px; padding: 6px; position: relative; }
        select { width: 100%; background: none; border: none; color: #fff; font-size: 16px; font-weight: 900; outline: none; appearance: none; }

        /* MANÓMETROS CON FUNCIÓN IDEAL */
        .gauges { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px 15px; }
        .gauge { border: 4px solid; border-radius: 15px; padding: 10px; text-align: center; background: #000; position: relative; }
        .g-baja { border-color: #00e5ff; }
        .g-alta { border-color: #ff5722; }
        .g-val { font-size: 40px; font-weight: 900; display: block; font-family: monospace; }
        
        /* EL TILDE IDEAL */
        .ideal-tag { background: #39ff14; color: #000; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); white-space: nowrap; }

        /* CUADRO DE DIAGNÓSTICO */
        .diag-box { margin: 0 15px; padding: 15px; border-radius: 10px; background: #111; border: 1px solid #333; text-align: center; }
        .diag-status { font-size: 16px; font-weight: 900; color: #39ff14; }
    </style>
</head>
<body>

<div class="v34-container">
    <div class="header">
        <div class="empresa">MULTISERVICIOS ANATO S.M.G.</div>
        <div id="loc-display" style="font-size:11px; color:#00e5ff; font-weight:900; margin-top:5px;">📍 UBICACIÓN: LOS GUAYOS</div>
        <a href="calculadora_btu.html" class="btu-btn">BTU 📏</a>

        <div class="main-row">
            <div style="text-align:center;">
                <div style="width:24px; height:24px; border:2px solid #fff; margin:0 auto; background:#fff;"></div>
                <span style="font-size:9px; font-weight:900;">GPS ✔</span>
            </div>
            <div style="flex:1; text-align:center; color:#00e5ff; font-size:16px; font-weight:900;">ANALIZADOR JHA</div>
            <div class="amb-box">
                <span style="font-size:9px; color:#39ff14; font-weight:900; display:block;">AMB.</span>
                <input type="number" id="temp-val" class="amb-in" value="30" oninput="calcularIdeal()" inputmode="decimal">
                <span style="color:#39ff14; font-weight:900;">°C</span>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active-aires">AIRES</div>
        <div class="tab">NEVERAS</div>
        <div class="tab">AUTO</div>
    </div>

    <div class="gas-section">
        <div class="sel-wrap"><span style="font-size:8px; color:#aaa;">GAS</span><select id="gas-sel" onchange="calcularIdeal()"><option>R22</option><option>R410A</option></select></div>
        <div style="text-align:center;"><input type="checkbox" checked style="width:20px; height:20px;"></div>
        <div class="sel-wrap"><span style="font-size:8px; color:#aaa;">REEMP.</span><select disabled><option>-</option></select></div>
    </div>

    <div class="gauges">
        <div class="gauge g-baja">
            <div class="ideal-tag">IDEAL: <span id="ideal-baja">65</span> PSI</div>
            <span style="font-size:10px; font-weight:900; color:#00e5ff;">BAJA</span>
            <span class="g-val" id="val-baja">62</span>
        </div>
        <div class="gauge g-alta">
            <div class="ideal-tag">IDEAL: <span id="ideal-alta">210</span> PSI</div>
            <span style="font-size:10px; font-weight:900; color:#ff5722;">ALTA</span>
            <span class="g-val" id="val-alta">185</span>
        </div>
    </div>

    <div class="diag-box">
        <div id="diag-msg" class="diag-status">✓ SISTEMA EN RANGO IDEAL</div>
        <div style="font-size:10px; color:#888; margin-top:5px;">ACEITE: MIN/AB | CARGA: LÍQUIDA</div>
    </div>
</div>

<script>
    function calcularIdeal() {
        const temp = parseFloat(document.getElementById('temp-val').value);
        const gas = document.getElementById('gas-sel').value;
        const dispBaja = document.getElementById('ideal-baja');
        const dispAlta = document.getElementById('ideal-alta');

        // Lógica simplificada: La presión ideal sube con la temperatura
        // Esto es un ejemplo, tú puedes ajustar las tablas exactas
        if (gas === "R22") {
            const bajaBase = 60 + (temp - 25) * 0.5; 
            const altaBase = 180 + (temp - 25) * 2.5;
            dispBaja.innerText = Math.round(bajaBase);
            dispAlta.innerText = Math.round(altaBase);
        }
        
        console.log("Calculando para " + temp + "°C");
    }

    window.onload = calcularIdeal;
</script>
</body>
</html>
