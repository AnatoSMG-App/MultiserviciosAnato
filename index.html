<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Narrow', sans-serif; margin: 0; padding: 10px; text-transform: uppercase; }
        .v30-container { width: 100%; max-width: 420px; margin: 0 auto; border: 1px solid #333; border-radius: 15px; background: #111; overflow: hidden; padding-bottom: 20px; }

        /* CABECERA CORREGIDA */
        .v30-header { padding: 15px; position: relative; background: #000; }
        .empresa { text-align: left; font-size: 14px; color: #fff; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; width: 75%; }
        .btu-float { position: absolute; top: 15px; right: 15px; background: #ff5722; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; font-weight: 900; font-size: 11px; text-decoration: none; }

        .main-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .jha-brand { flex: 1; text-align: center; color: #00e5ff; font-size: 18px; font-weight: 900; }

        /* AMBIENTE */
        .amb-side { border: 2px solid #39ff14; border-radius: 8px; padding: 5px; background: #051005; text-align: center; min-width: 75px; }
        .amb-in { background: none; border: none; color: #39ff14; font-size: 22px; font-weight: 900; width: 45px; text-align: center; outline: none; }

        /* TABS */
        .tabs-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; }
        .tab { padding: 12px 0; text-align: center; font-size: 12px; font-weight: 900; background: #222; border-radius: 8px; border: 1px solid #444; cursor: pointer; color: #888; }
        .tab.active-aires { border-color: #00e5ff; color: #00e5ff; }
        .tab.active-neveras { border-color: #39ff14; color: #39ff14; }
        .tab.active-auto { border-color: #ff3131; color: #ff3131; }

        /* BLOQUE GASES Y REEMPLAZOS */
        .gas-grid { display: grid; grid-template-columns: 1fr 40px 1.2fr; gap: 5px; padding: 0 15px; align-items: end; }
        .gas-box { background: #222; border: 1px solid #444; border-radius: 8px; padding: 8px; }
        .gas-label { font-size: 9px; color: #aaa; font-weight: 900; display: block; margin-bottom: 4px; }
        .gas-select { width: 100%; background: none; border: none; color: #fff; font-size: 15px; font-weight: 900; outline: none; appearance: none; }
        
        .check-reemp { width: 22px; height: 22px; cursor: pointer; accent-color: #00e5ff; margin-bottom: 12px; }

        /* --- MANÓMETROS (ALTA Y BAJA) --- */
        .press-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px 15px; }
        .gauge { border-radius: 12px; padding: 15px; text-align: center; border: 3px solid; position: relative; background: #000; }
        .gauge-baja { border-color: #00e5ff; box-shadow: 0 0 15px #00e5ff33; }
        .gauge-alta { border-color: #ff5722; box-shadow: 0 0 15px #ff572233; }
        
        .gauge-lbl { font-size: 11px; font-weight: 900; display: block; margin-bottom: 5px; }
        .gauge-val { font-size: 42px; font-weight: 900; font-family: monospace; display: block; }
        .unit { font-size: 10px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="v30-container">
    <div class="v30-header">
        <div class="empresa">MULTISERVICIOS ANATO S.M.G.</div>
        <div id="loc-display" style="font-size: 11px; color: #00e5ff; font-weight: 900;">📍 BUSCANDO SEÑAL...</div>
        <a href="calculadora_btu.html" class="btu-float">BTU 📏</a>

        <div class="main-row">
            <div id="gps-btn" style="cursor:pointer;" onclick="toggleGPS()">
                <div style="width:20px; height:20px; border:2px solid #fff; margin:0 auto;" id="gps-box"></div>
                <span style="font-size:9px; font-weight:900;">GPS</span>
            </div>
            <div class="jha-brand">ANALIZADOR DE<br>PRESIONES JHA</div>
            <div class="amb-side">
                <span style="font-size:9px; color:#39ff14; font-weight:900;">AMB.</span>
                <div>
                    <input type="number" id="temp-val" class="amb-in" value="25" inputmode="numeric">
                    <span style="color:#39ff14; font-weight:900; font-size:18px;">°C</span>
                </div>
            </div>
        </div>
    </div>

    <div class="tabs-row">
        <div id="tab-aires" class="tab active-aires" onclick="selectTab('aires')">AIRES</div>
        <div id="tab-neveras" class="tab" onclick="selectTab('neveras')">NEVERAS</div>
        <div id="tab-auto" class="tab" onclick="selectTab('auto')">AUTO</div>
    </div>

    <div class="gas-grid">
        <div class="gas-box">
            <span class="gas-label" style="color:#39ff14;">GAS ORIG.</span>
            <select id="gas-orig" class="gas-select" onchange="updateReemp()"></select>
        </div>
        <div style="text-align: center;">
            <input type="checkbox" id="check-reemp" class="check-reemp" onchange="toggleReemp()">
        </div>
        <div class="gas-box" id="box-reemp" style="opacity: 0.3;">
            <span class="gas-label" style="color:#ff5722;">REEMP.</span>
            <select id="gas-reemp" class="gas-select" disabled>
                <option>SIN REEMP.</option>
            </select>
        </div>
    </div>

    <div class="press-row">
        <div class="gauge gauge-baja">
            <span class="gauge-lbl" style="color:#00e5ff;">BAJA (PSI)</span>
            <span class="gauge-val" id="val-baja" style="color:#00e5ff;">62</span>
        </div>
        <div class="gauge gauge-alta">
            <span class="gauge-lbl" style="color:#ff5722;">ALTA (PSI)</span>
            <span class="gauge-val" id="val-alta" style="color:#ff5722;">183</span>
        </div>
    </div>
</div>

<script>
    const dataGases = {
        aires: {
            "R22": ["MO29 (422D)", "MO99 (438A)", "R427A"],
            "R410A": ["SIN REEMP."],
            "R32": ["SIN REEMP."],
            "R407C": ["R407F"]
        },
        neveras: {
            "R134A": ["SIN REEMP."],
            "R600A": ["SIN REEMP."],
            "R12": ["MP39 (401A)", "R406A"]
        },
        auto: {
            "R134A": ["SIN REEMP."],
            "R1234YF": ["SIN REEMP."]
        }
    };

    function selectTab(mode) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-aires', 'active-neveras', 'active-auto'));
        document.getElementById('tab-' + mode).classList.add('active-' + mode);
        
        const origSel = document.getElementById('gas-orig');
        origSel.innerHTML = Object.keys(dataGases[mode]).map(g => `<option value="${g}">${g}</option>`).join('');
        updateReemp();
    }

    function toggleReemp() {
        const check = document.getElementById('check-reemp');
        const box = document.getElementById('box-reemp');
        const sel = document.getElementById('gas-reemp');
        
        if(check.checked) {
            box.style.opacity = "1";
            sel.disabled = false;
        } else {
            box.style.opacity = "0.3";
            sel.disabled = true;
            sel.innerHTML = "<option>SIN REEMP.</option>";
        }
        updateReemp();
    }

    function updateReemp() {
        const check = document.getElementById('check-reemp');
        if(!check.checked) return;

        const mode = document.querySelector('.tab[class*="active"]').id.split('-')[1];
        const gasSelected = document.getElementById('gas-orig').value;
        const reempSel = document.getElementById('gas-reemp');
        
        const lista = dataGases[mode][gasSelected] || ["SIN REEMP."];
        reempSel.innerHTML = lista.map(r => `<option value="${r}">${r}</option>`).join('');
    }

    // Iniciar
    window.onload = () => selectTab('aires');
</script>
</body>
</html>
