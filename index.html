<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 10px; text-transform: uppercase; }
        .v23-header { width: 100%; max-width: 400px; margin: 0 auto; border: 1px solid #222; padding: 10px; border-radius: 10px 10px 0 0; }
        
        /* 1. Nombre de Empresa */
        .empresa { text-align: center; font-size: 10px; color: #888; letter-spacing: 2px; margin-bottom: 10px; }
        
        /* 2. Fila GPS y BTU */
        .nav-row { display: flex; justify-content: space-between; align-items: center; }
        .gps-box { color: #00e5ff; font-size: 12px; font-weight: 900; display: flex; align-items: center; gap: 5px; }
        .btu-orange { background: #ff5722; color: #fff; border: none; padding: 7px 15px; border-radius: 5px; font-weight: 900; font-size: 12px; box-shadow: 0 4px #bf360c; cursor: pointer; }
        .btu-orange:active { transform: translateY(2px); box-shadow: 0 2px #bf360c; }
    </style>
</head>
<body>

<div class="v23-header">
    <div class="empresa">MULTISERVICIOS ANATO S.M.G.</div>
    <div class="nav-row">
        <div class="gps-box">📍 GPS: CONECTADO [X]</div>
        <button class="btu-orange">BTU 📏</button>
    </div>
</div>

</body>
</html>
