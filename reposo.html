<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.M.G. Analizador V36</title>
    <style>
        /* Tus estilos originales aquí... */
        body { background-color: #000; color: #00ff00; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .gauge-container { display: flex; justify-content: space-around; margin-top: 20px; }
        input, select { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 10px; border-radius: 5px; }
        .btn-smg { background: #00ff00; color: #000; font-weight: bold; border: none; padding: 15px; border-radius: 5px; cursor: pointer; width: 80%; }
    </style>
</head>
<body>

    <div id="analizador-original">
        <h1>S.M.G. ENGINEERING</h1>
        <p>Analizador de Carga Calibrado (+17°C)</p>
        
        </div>

    <hr style="border: 1px solid #333; margin: 40px 0;">

    <div id="modulo-reposo" style="background: #0a0a0a; padding: 20px; border-radius: 20px; border: 2px solid #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.1);">
        <h3 style="color: #00ff00; text-transform: uppercase; letter-spacing: 2px;">🧪 Diagnóstico de Reposo</h3>
        
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-top: 20px;">
            <div style="width: 42%;">
                <small style="color: #888;">META TEÓRICA</small>
                <div id="reloj-ideal" style="font-size: 2.2em; color: #00ff00; font-weight: bold; font-family: monospace;">00:00</div>
                <div style="margin-top: 10px; border-top: 1px solid #222; padding-top: 5px;">
                    <span id="psi-teorico-anim" style="font-size: 1.4em;">--</span><br>
                    <small style="color: #666;">PSI IDEAL</small>
                </div>
            </div>

            <div style="width: 16%; display: flex; flex-direction: column; gap: 15px; padding-top: 25px;">
                <button onclick="iniciarPrueba()" style="background:none; border:none; font-size:2.5em; cursor:pointer;">🟢</button>
                <button onclick="finalizarPrueba()" style="background:none; border:none; font-size:2.5em; cursor:pointer;">🔴</button>
            </div>

            <div style="width: 42%;">
                <small style="color: #888;">TIEMPO REAL</small>
                <div id="reloj-real" style="font-size: 2.2em; color: #fff; font-weight: bold; font-family: monospace;">00:00</div>
                <div style="margin-top: 10px; border-top: 1px solid #222; padding-top: 5px;">
                    <input type="number" id="psi-manual" placeholder="PSI Real" style="width: 70%; background: #111; border: 1px solid #444; color: #fff; padding: 5px; border-radius: 5px; text-align: center;">
                    <br><small style="color: #666;">MANÓMETRO</small>
                </div>
            </div>
        </div>

        <div id="consola-diagnostico" style="margin-top: 20px; background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333;">
            <p id="txt-diagnostico" style="color: #00ff00; font-size: 0.9em; margin: 0; font-weight: bold;">SISTEMA LISTO PARA ANÁLISIS</p>
        </div>
    </div>

    <div style="margin: 50px 0; padding-bottom: 30px;">
        <button onclick="window.location.href='calculadora_btu.html'" style="background: transparent; color: #ff8c00; border: 2px solid #ff8c00; padding: 18px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 90%; box-shadow: 0 0 10px rgba(255,140,0,0.2);">
            📐 IR A CALCULADORA VOLUMÉTRICA
        </button>
    </div>

    <script>
    let timerIdeal, timerReal;
    let segI, segR;

    function iniciarPrueba() {
        clearInterval(timerIdeal); clearInterval(timerReal);
        // Lógica de gas: R410A/R32 = 8 min, otros = 5 min
        const g = document.getElementById('gasSelect') ? document.getElementById('gasSelect').value : 'R22';
        segI = (g === 'R410A' || g === 'R32') ? 480 : 300;
        segR = 0;
        
        document.getElementById('txt-diagnostico').innerText = "⏳ ANALIZANDO EQUILIBRIO...";
        
        timerIdeal = setInterval(() => {
            if(segI > 0) { segI--; actualizarReloj('reloj-ideal', segI); }
        }, 1000);

        timerReal = setInterval(() => {
            segR++; actualizarReloj('reloj-real', segR);
            if(segR > segI) document.getElementById('reloj-real').style.color = "#ff0000";
        }, 1000);
    }

    function finalizarPrueba() {
        clearInterval(timerIdeal); clearInterval(timerReal);
        const g = document.getElementById('gasSelect') ? document.getElementById('gasSelect').value : 'R22';
        const tope = (g === 'R410A' || g === 'R32') ? 480 : 300;
        
        let msg = "";
        if(segR < 90) msg = "⚠️ FALLA DE COMPRESIÓN: El gas igualó muy rápido.";
        else if(segR > tope + 60) msg = "⚠️ COLESTEROL DETECTADO: El flujo está obstruido.";
        else msg = "✅ SISTEMA SANO: Equilibrio perfecto.";
        
        document.getElementById('txt-diagnostico').innerText = msg;
    }

    function actualizarReloj(id, s) {
        let min = Math.floor(s / 60);
        let seg = s % 60;
        document.getElementById(id).innerText = `${min.toString().padStart(2,'0')}:${seg.toString().padStart(2,'0')}`;
    }
    </script>
</body>
</html>
