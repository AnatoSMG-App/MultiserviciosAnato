<!DOCTYPE html>
<html>
<head>
    <title>Multiservicios Anato SMG - Calculadora</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 3px solid #f39c12; width: 100%; max-width: 450px; box-shadow: 0 0 20px rgba(243, 156, 18, 0.3); }
        h1 { color: #f39c12; text-align: center; margin-bottom: 5px; font-size: 1.5em; text-transform: uppercase; }
        h2 { color: #bdc3c7; text-align: center; margin-top: 0; font-size: 0.9em; letter-spacing: 1px; }
        .display { background: #000; color: #00ff41; padding: 20px; border-radius: 12px; text-align: center; font-size: 2.2em; font-family: monospace; border: 1px solid #00ff41; margin: 20px 0; box-shadow: inset 0 0 10px rgba(0,255,65,0.2); }
        label { display: block; margin-top: 12px; color: #f39c12; font-size: 0.85em; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #333; background: #262626; color: white; box-sizing: border-box; font-size: 1em; }
        input:focus { border-color: #f39c12; outline: none; }
        button { width: 100%; background: #f39c12; color: #000; padding: 18px; border: none; border-radius: 10px; margin-top: 25px; font-weight: bold; font-size: 1.2em; cursor: pointer; transition: 0.2s; }
        button:hover { background: #e67e22; transform: translateY(-2px); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.75em; color: #555; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>MULTISERVICIOS ANATO SMG</h1>
    <h2>Cálculo de Carga Térmica Profesional</h2>
    
    <div id="pantalla" class="display">0 BTU/h</div>
    
    <div class="grid">
        <div>
            <label>LARGO (Mts):</label>
            <input type="number" id="l" value="2.30" step="0.01">
        </div>
        <div>
            <label>ANCHO (Mts):</label>
            <input type="number" id="a" value="2.80" step="0.01">
        </div>
    </div>
    
    <label>ALTO (Mts):</label>
    <input type="number" id="h" value="2.50" step="0.01">

    <label>FACTOR AMBIENTAL:</label>
    <select id="f">
        <option value="600">600 BTU (Sombra / Fresco)</option>
        <option value="800" selected>800 BTU (Sol de tarde)</option>
        <option value="950">950 BTU (Zinc / Sol Extremo)</option>
    </select>

    <div class="grid">
        <div>
            <label>PERSONAS:</label>
            <input type="number" id="pers" placeholder="0">
        </div>
        <div>
            <label>VENTANAS:</label>
            <input type="number" id="vent" placeholder="0">
        </div>
    </div>

    <div class="grid">
        <div>
            <label>PUERTAS:</label>
            <input type="number" id="puer" placeholder="0">
        </div>
        <div>
            <label>EQUIPOS (PC/TV):</label>
            <input type="number" id="elec" placeholder="0">
        </div>
    </div>

    <button onclick="calcular()">GENERAR REQUERIMIENTO</button>
    
    <div class="footer">
        Calidad y Precisión en Refrigeración<br>
        © 2026 Multiservicios Anato SMG | Proyecto Murachi
    </div>
</div>

<script>
function calcular() {
    // Función de seguridad para valores vacíos
    const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;

    let l = getVal('l');
    let a = getVal('a');
    let h = getVal('h');
    let f = getVal('f');

    // Cargas adicionales
    let c_pers = getVal('pers') * 450;
    let c_vent = getVal('vent') * 500;
    let c_puer = getVal('puer') * 300;
    let c_elec = getVal('elec') * 600;

    // Fórmula Maestra (Volumen + Cargas Extras)
    let volumen = l * a * h;
    let btuBase = volumen * f;
    let totalBtu = btuBase + c_pers + c_vent + c_puer + c_elec;

    // Mostrar resultado con formato de miles
    document.getElementById('pantalla').innerText = Math.round(totalBtu).toLocaleString() + " BTU/h";
}
</script>

</body>
</html>
