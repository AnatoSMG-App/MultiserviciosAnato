<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga Térmica | Anato S.M.G.</title>
    <style>
        body {
            background: radial-gradient(circle, #001529, #000);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 15px;
        }
        .container {
            border: 2px solid #00d2ff;
            border-radius: 20px;
            padding: 20px;
            background: rgba(0, 10, 20, 0.9);
            box-shadow: 0 0 25px #00d2ff, inset 0 0 10px #00d2ff;
            max-width: 450px;
            margin: auto;
            position: relative;
        }
        .btn-volver {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 210, 255, 0.2);
            color: #00d2ff;
            border: 1px solid #00d2ff;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.75em;
            font-weight: bold;
        }
        /* Nombre en Azul Metálico */
        .brand-title { 
            color: #00d2ff; 
            text-shadow: 2px 2px 4px #000, 0 0 10px #00d2ff; 
            font-size: 1.8em;
            margin-bottom: 5px;
            font-weight: 800;
        }
        /* Título Blanco con Brillo */
        .main-title {
            color: #ffffff;
            text-shadow: 0 0 15px #ffffff, 0 0 25px #ffffff;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }
        .slogan { 
            color: #00d2ff; 
            font-style: italic; 
            font-size: 0.85em; 
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .input-group { margin: 15px 0; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #00d2ff; font-weight: bold; font-size: 0.9em; }
        input {
            width: 100%;
            padding: 12px;
            background: #001a33;
            border: 1px solid #00d2ff;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1.1em;
        }
        /* Verde Neón Recargado */
        .resultado-btu {
            font-size: 2.8em;
            color: #39ff14; 
            text-shadow: 0 0 20px #39ff14;
            margin: 15px 0;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
        }
        .btn-generar {
            background: #39ff14;
            color: #000;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 20px #39ff14;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-generar:hover { background: #32cd32; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-volver">⬅ ANALIZADOR</a>
    
    <div class="brand-title">ANATO S.M.G.</div>
    <span class="main-title">CÁLCULO DE CARGA TÉRMICA PROFESIONAL</span>
    <div class="slogan">"Calidad y Precisión en Refrigeración"</div>

    <div class="input-group">
        <label>Largo del área (Metros):</label>
        <input type="number" id="largo" placeholder="0" oninput="calcularBTU()">
    </div>
    <div class="input-group">
        <label>Ancho del área (Metros):</label>
        <input type="number" id="ancho" placeholder="0" oninput="calcularBTU()">
    </div>
    <div class="input-group">
        <label>Personas / Equipos:</label>
        <input type="number" id="personas" value="2" oninput="calcularBTU()">
    </div>

    <div style="color: #00d2ff; margin-top: 20px; font-weight: bold; letter-spacing: 1px;">CAPACIDAD REQUERIDA:</div>
    <div class="resultado-btu" id="total-btu">0 BTU</div>

    <button class="btn-generar" onclick="calcularBTU()">REGENERAR REQUERIMIENTO</button>
    
    <p style="font-size: 0.7em; color: #00d2ff; margin-top: 20px; opacity: 0.6;">
        S.M.G. Technology & Services | Los Guayos, Venezuela
    </p>
</div>

<script>
    function calcularBTU() {
        let largo = parseFloat(document.getElementById('largo').value) || 0;
        let ancho = parseFloat(document.getElementById('ancho').value) || 0;
        let personas = parseFloat(document.getElementById('personas').value) || 0;

        // Fórmula optimizada: Área * 650 + (Personas * 500)
        let area = largo * ancho;
        let btu = (area * 650) + (personas * 500);

        // Ajustar a múltiplos comerciales (12k, 18k, 24k...) si prefieres, 
        // pero aquí lo dejamos exacto para mayor precisión técnica.
        document.getElementById('total-btu').innerText = Math.round(btu).toLocaleString() + " BTU";
    }
</script>

</body>
</html>
